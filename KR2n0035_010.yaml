front:
  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷十
  hash: sha256:6c1bf9d837c668be9c736092c87ae45270eadb686fada5858263dea114deb25e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_010-1a, image: WYG0683/WYG0683-0643c.png}
body:
  text: 唐人及無名氏法帖唐左率府長史吳郡張旭書舊列卷五第十六但標名今移增舊二帖今歸入張芝四帖足下晚復不知疾痛如何深極憂難比也上下安之必得發耶謹案右一帖草書四行二十四字得足下十五日問為慰僕前患差張旭書謹案右一帖草書三行十六字知汝殊愁且得還為佳也冠軍暫暢釋當不得極蹤可恨吾病來不辦行動潛不可耳謹案右一帖草書六行三十三字終年纒此當復何理耶且方有諸分張不知比去復得一會不講竟不竟可恨汝還當思更就理一昨遊悉誰同故數往虎丘不此甚蕭索祖希時面因行藥欲數處看過還復共集散耳不見奴粗悉書云見左軍彌數論聽故也謹案右一帖草書十六行八十七字今欲歸復何適報之遣不知總散佳並侍郎耶言别事有及過謝憂勤謹案右一帖草書五行二十七字二月八日復得鄱陽等多時不耳為慰如何平安等人當與行不足不過彼與消息謹案右一帖草書五行三十二字唐太子少師京兆柳公權書舊列卷四第十一標諌議大夫今移改聖慈允許守官稍減罪責猶深憂懼續冀面言不一一誠懸呈卅弟處十四日敬空謹案右一帖草書五行三十二字伏審姊姊八月定發弟與草八弟同從行逺聞不勝抃躍今日元七來望弟速到極也願在路咨聞不停滯幸甚未即展豁尚增悢悢不一一公權呈草三弟草六弟草八弟卅弟處卅一弟意不殊前要小楷後使送往空謹案右一帖行草十行八十四字奉榮示承己上訖惟增慶恱下情但多欣愜垂情問以所要悚荷難任儻有赤箭時寄及三五兩以扶衰病便是厚惠不具公權狀白謹案右一帖行書六行五十一字至十六日専到崇賢惟昭察謹狀十五日公權狀謹案右一帖楷書二行十九字今附録辱問卻送及碑本兼虛奬逾涯但深反側因見趙張如虛奬之說為緣飾也幸甚不具公權呈謹案右一帖行書六行三十六字唐釋懷素書舊列卷五第十五今移右軍云吾真書過鍾而草故不減張僕以為真不如鍾草不及張所為世之所重以其能懷素書之不足以為道其言當不虛也謹案右一帖草書七行四十九字無名氏書第一第二兩帖舊列卷五標何氏書第三第四第五第六第七第八六帖舊俱列卷五標古法帖第九帖舊列卷十第十帖舊列卷九第十一帖舊列卷十俱誤標王獻之書今並移改一又古法帖內有兩帖與獻之書復今存其刪彼卷重出者其一則刪此而存彼投老殘年西崦已逼恆慮倏忽歸骸元壤溘爾冥滅竟不一言以此在懷預為其備於兹路惟有憑心他餘不能有益年將八十可以意求欲望長存何可得也道大難俗情見善從善如登見惡行惡如崩必須策怠惰勤精進愛日惜力乃可獲耳吞聲飲氣不勞頓尓他便生異議速自詳答取竟勿滯留也十六日謹案右一帖行草十三行一百二十字去留深情故當取尓餘散輩停歲積故切思歸三月下旬還非賖冀叙不遙南路行乃寂絶傷心謹案右一帖草書五行三十七字知賢弟至舍晚寒想顧之傷歎遂尓永惟痛壽春富陽范道長體氣以小勝前日得此暑大都尋常新婦書寄物示諸人散騎二君何時還兄子皆佳能數為也謹案右一帖行草八行六十一字既移屋近西牆微援裏地成大寬援裏起小三架如步廊政可一丈梁得使二家通出入作門閣也此屋之東故應作牆直步廊一壁太單空園中彌宜移三間屋故當不甚難重復粗畫圖如别耳謹案右一帖行草十一行七十五字足下既有意適間曠亦當忘暑耶遊矚疏數慰對者卿少吾今年病垂了始小差大小今床疾惛忽移日耳每每深望逺言慰尚賖慨然元昌寄與音介勿勿書復既與直人理略絶何緣復有周旋理長史斷闊亦不減卿唯公事時相瞻望耳吾面信遂至今不著不可解計至故應必有香但不知好惡云何耳須得謹案右一帖草書十七行一百二十字敬祖日夕還山隂與嚴使知聞頗多歲月今屬天寒擬適逺為當奈何奈何尓豈不令念姊逺路不能追求耳謹案右一帖行草五行四十二字孤不度德量力欲俟義於天下而措術淺短遂至昌蹶然至於今日志猶不息君謂計將安出謹案右一帖章草五行三十六字亮曰董卓己來豪傑並起跨州連郡不可勝數曹操比於袁紹則名微而衆寡故能尅紹以弱為强今日擁百萬之衆協挾天子而令諸侯誠能不可與爭鋒也謹案右一帖章草八行六十一字孫權據有江東以歷三世國險而民附賢能為用斯可與為援而不可圖也益州天府之地髙祖因之以成帝業荆州北據漢河利盡南海西連巴蜀東通吳會此用武之國而其不能治天所以資將軍將軍既是帝室之胄信義著於四海來之大國誠難至也謹案右一帖章草十行九十九字元度時往來以此為慰興公使適還數日具都下問人情所憂良可歎息諸吳數問齡前來經日極為差云仁祖欲請為軍司不知行不謹案右一帖草書八行五十二字元度何來遲深令人憂懸耶常復有理因祠監多感足下事甚善然所造極難想足下每思先後卿豈須言親親不己意耳安石停此過半日猶得一宿何物喻之一十當浦送近道所以致歎陽諸懷兒不可言且不復得卿送有諸歎今此奕上道謹案右一帖草書十三行九十四字淳化四年四月二十八日當直中使就院賜御札八分千字文一卷法帖一十卷受恩如是激節可知乙卯閏六月十四日太一宫齊晚臨南軒看謹案右跋行楷四行五十六字行間押公髙之裔印蘇氏家藏子容題謹案右題行書一行七字右法帖十卷得於吳興蘇氏乃元祐丞相魏公家第八卷後用公髙之裔印蓋言畢公髙之後也余假守濡須郡齊刋魏公談訓內載公於相國寺得畢文簡賜本閣帖甚奇且云文簡以啚書斥逺祖名未中禮因考實録淳化二年文簡自考功郎拜學士四年五月出知升州然則乃文簡在翰苑時所賜也李洪德秀謹題謹案右題楷書七行一百二十三字前押晚翠堂印末押李氏叔固李氏家藏二印宋搨第一真蹟丙戌王鐸薛所藴同觀北海孫奉常家藏謹案右題二行二十二字首六字𨽻書餘行書上有晉府書畫之印下有北海孫氏珍藏書畫印蘇公名頌丹陽人祖居泉州南安父紳葬丹陽因家焉元祐中拜相史稱其器局閎逺雖貴奉養如寒士嘗於相國寺得畢文簡公賜本閣帖載所著談訓中後題蘇氏家藏子容題筆法大似眉山丁酉正月十四日記謹案右跋行楷六行八十三字末押北平孫澤退翁二印張旭前二帖姜夔謂其非贋亦非合作論最平允大觀合為一帖標作隋僧智永豈未審帖尾旭自書名耶後二帖舊誤作張芝其筆勢縱逸是長史而非伯英因從米芾說更定公權聖慈帖人以其末署誠懸而不名多疑其僞伯思據右軍敬謝帖自稱逸少以證之况此乃與其弟書固不妨以字行耳閣帖第五卷一標何氏書兩標古法帖何氏猶言何人長睿之說極當古法帖則本逸其名因改標無名氏書以殿全編黃以投老二帖類歐陽詢姜以賢弟帖類王獻之米以移屋二帖類羊欣皆出臆說未可泥從也敬祖鄱陽二帖復見子敬書鄱陽帖當屬之大令因刪此以就彼敬祖乃王導子武岡侯協非子敬同時與元度兩帖正相似曷若闕疑之為愈乎孤不度德量力以下三帖皆諸葛亮傳中語章草並同顧或作古帖或標獻之尤為失考今悉訂正歸一其畢士安識語為兹帖權輿蘇頌李洪王鐸孫承澤諸題跋亦源流可溯並命摹勒帖後用示傳信御識初搨曽經賜文簡流傳七百七旬年無雙善本教重泐有數吉光幸獨全並弆書軒兹數典非關治道彼稱賢由今視昔徒佳話義具蘭亭序一篇重摹淳化閣帖成因並弆畢士安原本於淳化軒詩以志事壬辰夏御筆文軒題榜因名帖石墨鐫華勝昔年鑑古一空流派溷淳化帖後惟大觀刻本最佳然考訂不精不詳而鉤摹亦稍失古意他若絳帖潭帖鼎帖之類支派益岐流傳更無善本此帖頒行衆搨當如爝火之息矣訂訛都奉品評全王著排次標題訛誤不可僂數今悉經大概訂正並於每冊後各繫御識舉示憾無毫髮超淳化信有權輿賜集賢今所摹刻宋搨初本乃畢士安為翰林學士時得賜者榮甚陳劉事音釋宋陳與義雖奉敕校釋閣帖未得鐫石並傳其後劉次莊輩各有釋文皆自著専行亦非官本臣今承命音釋附列帖中實為榮幸祇慚未熟佩觿篇臣于敏中恭和釋文訂異張旭晚復帖復從顧從義釋劉次莊姜夔俱作後十五日帖前字畫旁多一曲疑是鉤摹之失冠軍帖辨從姜夔顧從義釋辨當作辦古通又不可從姜釋大觀合二字作處字義雖較優但筆蹤牽附增改究失本真不若仍從其舊顧謂是王著誤摹王澍謂著本摹作潛處後人以紙幅短妄分存以備考終年帖復從姜夔釋有作治字者非又比去從顧從義釋姜作以去又講竟不竟俱從施宿釋姜作忘顧作意俱難通又一昨從姜釋顧云一本合二字作所似於草法未合又數處下空顧云不能容看字故提頭又彌數從顧釋王澍作彌若存參欲歸帖遣從顧從義釋姜夔作追字體不類又不知亦從顧釋姜作不具又佳並從姜釋劉次莊釋同顧釋作往佳且以為劉闕釋俱非又勤字似勒王澍云是筆駛少一折論似確柳公權聖慈帖敬空顧從義作問王澍謂空字失下半說較合從之伏審帖元七從顧從義釋一作元叔非又展豁從朱家標釋顧作割非又悢悢從顧釋按玉篇悢悢惆悵也或作恨恨非又後使從劉次莊釋顧云後當作復使一作便俱非又帖末一字朱家標釋作耶顧云一作言體皆不類王澍以為當是空字云唐宋人書帖多有之其說為長因從之無名氏書投老帖策從姜夔釋顧從義作榮非又不勞亦從姜釋顧作身非又取竟亦從姜釋草體應如此顧以為疑何耶又他亦從姜釋陳與義作地非去留帖取爾從王澍釋草法較合劉次莊姜夔釋作所又思歸從姜釋顧從義作忽歸非晚寒帖以從姜夔釋以與己古通王澍云當是似字筆駛省一折存考又兄子亦從姜釋顧從義云兄一作允非移屋帖考字書同薔薇之薔姜夔釋作墻非又援姜云與園同顧從義訓作欄王澍以本帖下園字正作園此援字當如顧解按欄為階際句欄及牡丹芍藥稱欄之類其內安得有餘地起屋考毛詩鄭風疏園者圃之蕃齊風疏樊圃之樊訓為藩爾雅釋言疏圃外藩籬謂之園而周禮太宰疏亦有園其藩也之訓是援與園同正當作藩籬解下文園字乃同義而體互見毋庸拘泥也且謝靈運田南樹園激流植援詩有插槿當列墉句更可為援即籬之證又直從施宿釋劉次莊作宜非又空從姜釋顧誤作恐又畫從姜釋劉作盡一作晝俱非間曠帖忘暑從姜夔釋劉次莊作惡暑非又慰對從顧從義釋姜作至又者卿者從王澍釋卿從姜釋又垂下一字澍作了劉姜俱作耳施宿云與下文耳字草法異似澍說為長從之又今床今從姜釋床從澍釋姜釋作度草法不類劉釋作會使可疑又每每從劉姜釋施作每日非又昌寄與音介昌從施釋劉作過寄與從劉釋姜以昌寄與三字作日具問可令五字顧作昌之問可令音介亦從劉釋音顧作晉介一作分俱存考又勿勿從姜釋姜据顔氏家訓引說文云忩遽者稱勿勿又引祭義注勿勿猶勉勉也或作忽忽又作匆匆皆不及姜訓之合又與直與從劉釋姜作即直從姜釋劉作宜又略絶從劉姜釋施作略紀非又面信從劉釋姜作面促又須得從劉姜釋米芾云當作欣白與上一帖皆羊欣書按帖卷八內即有羊欣書其結體及署名與此皆不類未足為羊書之据惟須得二字語意未了其下或尚有脫簡蓋此帖難考處甚多或筆駛未完或鉤摹稍失其諸家互異者皆未能確切可信不得不存疑俟考耳敬祖帖使知從劉次莊釋顧從義云唐摹一本作君文義為優而草法不合度德帖俟從姜夔釋顧從義因史文作信遂以俟為古伸字非又措術諸釋皆同史作智術又君謂亦從姜釋顧作若亮曰帖曰從姜夔釋史文正同劉次莊施宿作白非又桀與傑同此字鉤摹有缺又袁紹從劉姜釋顧從義作表雖字體相合與史文異豈表謂劉表作書者别有據耶存考又協從劉釋史文無此字或是筆誤衍文又與從史文及姜釋劉作久非又峰從顧釋施云與鋒通用江東帖以歷之以與己通又盡從劉次莊釋一作逮又西連帖作武用武帖作連俱有史文可據蓋摹刻時倒置也又著從劉釋玩字體類若但與史文不合未可改易來之大國八字諸葛傳所無王澍以為亦如帖首七月二日獻之白七字俱妄人所加但此句無甚關礙仍存其舊往來帖諸吳從陳與義釋劉次莊作從來遲帖令從顧從義釋劉次莊作足又常復從王澍釋顧作當謂又卿從黃諌釋顧作公非又半日從劉釋黃作已又喻亦從劉釋顧疑作呱非又一十亦從劉釋字畫雖似而義難曉顧合作早亦非又送從顧釋黃作道又近亦從劉釋施宿作迎非又歎亦從劉釋黃作澍從之疑是邑旁少折又奕從黃釋顧作貪亦不甚合此帖字體可疑文義難解者頗多或當時排次脫訛或上石鉤摹舛缺俱無可考證姑就諸家音釋中擇其近似者録之仍識以存疑乾隆三十四年歲在己丑春二月奉敕校正宋淳化閣帖初搨模勒上石謹案第十卷共二十二帖一百七十八行一千二百八十七字欽定重刻淳化閣帖釋文卷十
