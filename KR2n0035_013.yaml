  text: 總理和碩諴親王臣允祕多羅履郡王臣永珹排類經筵講官太子太保協辦大學士戶部尚書臣于敏中經筵講官禮部尚書臣王際華經筵講官工部尚書兼管順天府府尹臣裘曰修刑部左侍郎臣錢維城校對內閣學士兼禮部侍郎臣王杰日講起居注官詹事府少詹事臣彭元瑞日講起居注官右春坊右庶子臣曹文埴日講起居注官翰林院侍讀臣金士松日講起居注官翰林院侍讀臣董誥日講起居注官翰林院侍講臣沈初廣西道監察御史臣陳孝泳監造內務府廣儲司總管六庫事務郎中臣六十九會計司主事臣積福鉤刻恩賜鴻臚寺序班小臣常福小臣瑪色小臣德福小臣四達塞小臣德壽小臣黎國傑小臣趕生小臣德魁小臣常壽
