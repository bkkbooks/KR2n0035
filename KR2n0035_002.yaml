  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷二
  hash: sha256:dc68b90c714a2ec23ef313e0e2235896a14fae3527f3d8fd1658df607e9fe399
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_002-1a, image: WYG0683/WYG0683-0570c.png}
body:
  text: 上古至晉人法帖軒轅氏史蒼頡書舊列卷五首但標名今移並從通鑑改題戊己甲乙居首共友所止列世式氣光名左互乂家受赤水尊戈矛斧芾謹案右一帖篆書四行二十八字孔子書舊列卷五第三標魯司寇稱字今移並特書表異烏延陵封有吳君子之墓呼謹案右一帖篆書二行十二字秦御史下邽程邈書舊列卷五第六但標名今移改以下皆增系爵里天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為為天下正其致之天無以清將恐歇謹案右一帖楷書五行四十六字今附録後漢濟北相涿郡崔瑗書舊列卷二第二按瑗字子玉舊誤稱字今移改賢女委頓積日治此為憂懸憔心今已極佳足下勿復憂念有信來數附書知聞以解其憂謹案右一帖草書五行三十五字後漢徴士𢎞農張芝書舊列卷二首但標名今移改舊五帖今移四帖入張旭書八月九日芝白府君足下不為秋涼平善廣間彌邁想思無違前比得書不逐西行望遠懸想何日不勤捐棄漂沒不當行李又去春送舉喪到美陽須待伴比故遂簡絶有緣復相聞餐食自愛張芝幸幸甚甚謹案右一帖章草六行八十字後漢屯田都尉董祀妻陳留蔡琰書舊列卷五第十三但標名今移改我生之初尚無為我生之後漢祚衰謹案右一帖草書二行十四字魏太傅潁川鍾繇書舊列卷二第三但標名今移改舊六帖今移一帖入王羲之書尚書宣示孫權所求詔令所報所以博示逮于卿佐必冀良方出於阿是芻蕘之言可擇郎廟況繇始以疏賤得為前恩橫所􅀈睨公私見異愛同骨肉殊遇厚寵以至今日再世䇿名同國休戚敢不自量竊致愚慮仍日達晨坐以待旦退思鄙淺聖意所棄則又割意不敢獻聞深念天下今為已平權之委質外震神武度其拳拳無有二計髙尚自疏況未見信今推款誠欲求見信實懷不自信之心亦宜待之以信而當護其未自信也其所求者不可不許許之而反不必可與求之而不許勢必自絶許而不與其曲在已里語曰何以罰與以奪何以怒許不與思省所示報權疏曲折得宜神聖之慮非今臣下所能有增益昔與文若奉事先帝事有數者有似於此粗表二事以為今者事勢尚當有所依違願君思省若以在所慮可不須復貌節度惟君恐不可采故不自拜表謹案右一帖楷書十八行二百九十八字今附録繇白昨疏還示知憂虞復深遂積疾苦何乃爾耶蓋張樂於洞庭之野鳥值而髙翔魚聞而深潛豈絲磬之響雲英之奏非耶此所愛有殊所樂乃異君能審已而恕物則常無所結滯矣鍾繇白謹案右一帖楷書六行七十四字今附録白騎遂內書不俟車駕計吳人權道情懷急切當以時月待取伏罪之言蓋不以疑相府小緣心吞若八九謹案右一帖楷書四行四十一字今附録弟常患常羸頓遇寒進口物多少新婦動止仰人謹案右一帖行楷二行十九字今附録十二日繇白雪寒想勝常得張侯書賢從帷帳之悼甚哀傷不可言疾患自宜量力不復具繇白謹案右一帖行楷四行三十七字今附録魏太傅河內司馬懿書舊列卷一第三標西晉宣帝今移改之白阿史病轉差未皆列曹尚書之白書法謹案右一帖草書二行十七字吳侍中廣陵皇象書舊列卷二第四標青州刺史今移改文武將隊乃俾俊臣整我皇綱董此不䖍古君子即戎忘身昭其果毅尚其桓桓師尚七十氣冠三軍詩人作歌如鷹如鸇天有泰一五將三門地謹案右一帖草書六行五十六字臣象言頑暗容薄加以年老凡百乖穢無所中宜特䝉哀傷殊異之遇安感騎乘之歡遊息之燕淳和足使忘軀命榮觀足以光心膂延望翹翹念在效報而蕭走垂須終何才力以答新恩唯尚有借近趙走文過首貧尚尋天恩智方當私成無往顔愛自彌文唯謹案右一帖章草九行一百字晉齊王攸書舊列卷三第十標侍中司馬攸今移改攸惶恐頓首頓首望近未得咨承以為委積比已秋風不審尊體何如冀行得禀受首頓首謹案右一帖行楷四行三十五字今附録晉㑹稽王道子書舊列卷一第九標東晉文孝王今移改異暑復何如向見欽云卿小苦瘧不乃以為患治之不遣不悉司馬道子白謹案右一帖行楷三行二十九字今附録晉特進京兆杜預書舊列卷三第四標侍中今移改十一月十四日預頓首嵗忽已終别久益兼其勞道遠書問又簡間得來況知消息申省次若言面謹案右一帖草書五行三十八字親故數移轉想祖父白具云也祖父如足下來言小大云具孤女親親也有信數附書信以慰吾心也謹案右一帖草書四行三十九字晉太保河東衛瓘書舊列卷二第十六標尚書令今移改頓州民衛瓘惶恐死罪中闕音敬望想想懷在外纍年始爾得還情甚踊躍且至卅里上須節度明日乃入奉說欣承福祚自白不具瓘惶恐死罪謹案右一帖草書六行五十六字晉司空范陽張華書舊列卷二第五標丞相今移改得書為慰僕諸惛疾已甚暫西臥歸還乃悉比將念反不具張華呈謹案右一帖草書四行二十六字晉司徒河內山濤書舊列卷三第二十五標太守今移改侍中尚書僕射奉車都尉新㳫伯臣濤言臣近啓崔諒史曜陳准可補吏部郎詔書可爾此三人皆衆論所稱諒尤質止少華可似敦教雖大化未可倉卒風尚所勸為益者多臣以為宜先用諒謹隨事以聞謹案右一帖行楷八行七十九字今附録晉後將軍燉煌索靖書舊列卷三第十六標征西司馬今移改載妖㜸遏臧災災莫告咎臯陶惟士繩罪報鞫按城據端裁割辜戮羞屈訴謾逆曲歸想輟寂鬬爭念復鞉鼓肆陳愛曰於豫琴瑟以詠歌其命禽爵翔榮獸乃起舞聲翳麗城越動飛走脈土䖍農姬棄掌稷謹案右一帖章草八行七十九字七月草六日具書靖白雖數相聞不解勞倦信至得書悉知弃云宅及計來東言展有期索靖白謹案右一帖章草四行三十七字晉中書侍郎吳郡陸雲書舊列卷三第二十二但標名今移改三月十六日雲白春節餘不適得示知足下平安為思面未知何由如何信數之及鄉既清邃可與經髙言人欽之當令征南取之也謹案右一帖草書五行五十一字晉黃門郎河東衛恆書舊列卷二第十七今移一日有恨知問未面為歎欲七日云耶恆白謹案右一帖草書二行十七字晉太傅琅琊王導書舊列卷二第七標丞相今移改省示具卿辛酸之至吾守憂勞卿此事亦不暫忘然書足下所欲致身處尚在殿中王制正自欲不得許卿當如何導亦天明往謹案右一帖草書八行四十九字導白改朔情增傷感濕蒸自何如頗小覺損不帖有應不懸耿連哀勞滿悶不具王導謹案右一帖草書五行三十三字晉荆州刺史琅琊王廙書舊列卷二第十二標侍中今移改草四日廙白唯久白想適妙來行未面遲想得示知同云冀何生相見近及不多王廙白謹案右一帖草書四行三十四字臣廙言臣祥除以復五日窮思永遠肝心寸截甘雪應時嚴寒奉被手詔伏承聖體御膳勝常以慰下情臣故患胸滿氣上頓乏勿勿慈恩垂愍每見慰問感戴屏營不勝銜遇謹表陳聞臣廙誠惶頓首頓首死罪死罪謹案右一帖行楷六行八十三字今附録臣廙言昨表不宣奉賜手詔伏承聖體勝常以慰下情不審宿昔復何如承鄭夫人乃尓委頓今復增損伏惟哀亡愍存益勞聖心謹附承動靜臣廙言謹案右一帖行楷四行五十八字今附録七月十三日告籍之等近日遣王秋書不具月行復半念汝獨思不可堪居奈何奈何雨涼不審謹案右一帖草書三行三十七字㛐何如汝所患遂差未懸心不可言阿母䝉恩上下悉佳宜可行瀉瘧如復斷要取未斷愁人宜復具日發與别惘惘不可言今遣使未北反書不具自護會日消息廙疏謹案右一帖草書六行六十五字晉尚書左僕射琅琊王邃書舊列卷三第二十三標海陵恭侯今移改寒佳不張丞㛰事云何是良對足下可時令知女決也王邃白謹案右一帖草書三行二十四字晉標騎將軍丹陽紀瞻書舊列卷三第十九標車騎將軍瞻誤贍今移改瞻白昨信來永攜今逞又貧家無以將意今粉二斗少香所謂物微意全者也力書不多紀瞻頓首謹案右一帖草書四行三十八字晉太尉髙平郗鑒書舊列卷二第十三標太宰今移改鑒頓首頓首災禍無常奄承遘難念孝性攀慕兼剝不可堪勝奈何奈何望遠未緣叙苦以增酸楚鑒頓首頓首謹案右一帖行楷五行四十三字今附録晉右衛將軍琅琊劉超書舊列卷三第六但標名今移改超死罪白如命皆令有本末保任然後受隨宜分處謹白謹案右一帖行楷三行二十二字今附録晉尚書令濟陰十壼書舊列卷三第二十六標侍中壼誤壺今移改足下佳不朝將中郎上獲諸誠文墨至便在舍事許改愛子紙下物知此草勿令一人見也吾今敕書事令不發亟付卿發發便密令人防之壼白謹案右一帖草書六行五十六字晉司徒潁川庾亮書舊列卷三首標太尉按亮字元規舊誤作庾元亮今移改亮白奉告書葙先為媞子作輒先以奉之研今作之支髮枕今作無作模若有可權付之亮再拜謹案右一帖行草五行三十七字晉征西將軍潁川庾翼書舊列卷三第二標車騎將軍今移改故吏從事中郎庾翼參軍事劉遐死罪白昨所啓龐遺孟莫大羽所請求述上事事須撿挍咨論光駕當出請不從詣録事中郎共詳處别白謹啓翼遐死罪死罪謹案右一帖行楷七行六十字今附録已向季春感慕兼傷情不自任奈何奈何溫和足下何如吾哀勞何賴愛護時不足下頃氣力熟若别時謹案右一帖行草五行四十字晉太傅陳郡謝安書舊列卷二第十八今移安頓首頓首每念君一旦知窮煩寃號慕觸事崩踊尋繹茶毒豈可為心奈何奈何臨書悽悶安頓首頓首謹案右一帖行草四行四十一字六月草日具記道民安惶恐言此月向終惟祥變在近號慕崩慟煩寃深酷不可居處比奉十七十八日二告承故不和甚馳灼大熱尊體復何如謹白記不具謝安惶恐再拜謹案右一帖行草六行六十七字晉散騎常侍陳郡謝萬書舊列卷二第十九今移七月十日万告朗等便流火感傷兼切不自勝奈何奈何轉涼汝等各可可知近聞邑邑吾涉道動下疹乏劣力及不具告父疏謹案右一帖行草六行四十九字王著編次自二卷以下以名臣古帖分類比附既不倫且昧於論世知人前後率多蹖誤如張芝崔瑗開帖便已倒置蔡琰同是後漢而獨標古帖晉氏二王道子則上躋諸帝桃符則下雜羣僚衛瓘杜預為泰始佐命張華索靖陸雲皆渡江前人而編厠晉中葉諸家至庾亮紀瞻卞壼名字並舛且或僅標名或兼稱地亦無一定體例大觀雖加更正仍有未盡今悉按時世移定於卷前總標某朝至某朝人帖並於諸人詳系爵里附注考訂首列蒼頡用志六法權輿儕司馬懿於鍾繇以嚴臣分先諸王而殿列女則從史例焉至各帖中傳倣傅會固所不免而米芾黃伯思指為僞帖者亦過事吹求茲就確有可據者悉為移改餘概仍厥舊蓋古手鉤摹下真跡一等亦足禆益臨池無事齗齗聚訟耳又别本鍾繇書內有戎路表一帖筆意軟鈍與董其昌所稱唐搨單行者殊不類其為僞託無疑且詞義亦不足取更何必因李日華之言從而附益之耶御識釋文訂異蒼頡書釋舊闕今從宋楊信文鍾鼎篆韻補釋孔子書陵封邑三字釋舊闕今從托古遺文補釋此帖疑有錯簡張芝書不為從顧從義釋劉次莊作所為陳與義作不日又捐棄亦從顧釋黃庭堅捐作指劉棄作業俱非蔡琰書漢祚從姜䕫釋劉次莊作祀非司馬懿書列曹從王澍釋顧從義作外曹非又之白亦從澍釋顧作云得劉次莊作之得俱非皇象文武帖忘身從後漢書髙彪傳釋忘顧從義作是劉次莊施宿作從俱非騎乘帖並從顧從義釋容薄黃庭堅作空蕩中宜黃作聞宜軀黃作儉榮黃作裏過首施宿作過省俱非杜預道遠帖來況從顧從義釋劉次莊作來說移轉帖孤女從顧從義釋劉次莊作絶汝非衛瓘書頓下顧從義云當有首字存考又想懷從顧釋劉次莊作夜懷一作報懷俱非又且至亦從顧釋一作旦望非又須亦從顧釋一作領非又自白從王澍釋顧云當作得非按帖內躍字疑有闕損張華書已甚已字不合草法疑有闕損施宿併二字作欲亦未確姑從顧從義釋又反從顧釋施作及非又呈從施釋顧云一作頓首索靖臯陶帖遏從王澍釋顧從義作過非又端諸家釋作號按草法與智永千文端字同因改又於豫從顧釋一作爭非又翔榮亦從顧釋或作集作巢俱非又起舞從劉次莊釋施宿作歌顧作鼓俱非又䖍從澍釋顧作處非又棄從顧釋或作業非草六日帖信至從姜䕫釋施宿作信具非陸雲書春節從姜䕫釋或作喪非又及鄉可與欽之並從王澍釋顧從義作及卿作可之作歎之俱非王導省示帖示從顧從義釋一作不非又至亦從顧釋黃庭堅作言一作意俱非又吾守劉次莊施宿作甚與草法不合姑從王澍釋顧作慮非又忘從顧釋黃作忌非又殿中從黃釋劉作彀大觀摹作寇俱非導白帖蒸從姜䕫釋顧從義云一作惡非又自從顧釋一作日非又不懸不字與草法亦不甚合諸家釋並同姑從之王廙草四日帖同云從施宿釋顧從義作因云非七月帖等從姜䕫釋王澍作寺草法雖合義難通又不具從顧從義釋姜作言一作乙乙俱非又月行從劉次莊釋顧作側一作何俱非又獨思從姜釋顧云一作𬗟非又審從施宿釋姜作差顧作佳俱非大觀合下㛐何如作一帖劉姜分瘧如復斷别作一帖大觀為優今分行仍從舊㛐何如帖宜從姜䕫釋一作聞一作宣俱非又瀉諸家釋並闕顧從義云疑作瀉與草法不甚合然無可考姑從之又瘧從姜釋顧作疾又北反何焯合二字作發與他發字不類今從姜釋大觀摹作北及非又不具自護從王澍釋顧作不足白復非又會從顧釋一作言非按帖內消字有闕損紀瞻書永攜諸家釋並闕顧從義云疑作永攜與草法不甚合義亦難解姑從之存以俟考又今逞從顧釋姜䕫作今蓋一作送並存參又所謂亦從顧釋陳與義作須非卞壼書將中從王澍釋姜䕫作北中顧從義作比中又不發從姜釋顧云案筆法作友非又房姜作防云房防古通用從之劉次莊作傳非庾亮書四作字俱從姜䕫釋施宿以第三為注第四為治俱非庾翼書頃從姜䕫釋顧從義作須非謝安每念帖知窮從姜䕫釋王澍云當作哀窮謝萬書可可從顧從義釋大觀摹作可之非乾隆三十四年嵗在己丑春二月奉敕校正宋淳化閣帖初榻模勒上石謹案第二卷共四十三帖二百十八行二千一百七十九字欽定重刻淳化閣帖釋文卷二
