body:
  text: 臣伏見我皇上幾餘鑒古重訂淳化閣帖詳加考釋正其謬誤於標名排類則見義例之正於去取釋注則見折中之審允宜勒為成書登之四庫且俾承學之士未能仰窺搨本者亦得粗悉崖略臣因按次恭録仍為十卷每帖各識某體幾行若干字一條以補向來釋帖家所未備其有本屬楷書釋文所不及者亦録其本文庶一展卷而可得是帖之全以為藝林之助並恭摹宸翰四大字仍冠簡端而於御筆諭㫖記跋等篇並用聚珍版排印從諸書御筆例也乾隆丙申年仲夏月朔臣金簡恭跋
