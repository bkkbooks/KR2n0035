front:
  text: 御製淳化軒記淳化軒何為而作也以藏重刻淳化閣帖石而作也葢自伏滔崆峒之銘石虹堯碑之文歴代相傳石刻尚焉然物有其成必有其壊世逺年湮真偽莫辨則漢唐且難得其全者無論周秦以上矣故言帖必以趙宋為猶近而宋帖必以淳化為最美重刻之由考稽之故已見於帖前之㫖冊後之跋茲不複記記所以藏石作軒之故云石刻既成凡若干頁使散置之慮其有失也爰於長春園中含經堂之後就舊有之迴廊每廊砌石若干頁恰得若干廊而帖石畢砌焉廊之中原有蘊真齋因稍移齋於其北即舊基而拓為軒事起藏帖則以帖名名之夫淳化宋太宗之紀年也為人君者即不能以唐堯虞舜為師亦當以夏甲周成為軌所謂取法乎上僅能得中耳若宋太宗始終家國之間慙徳多矣吾所不取而又有何慕於淳化而以之名軒為哉
