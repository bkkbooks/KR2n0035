front:
  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷五
  hash: sha256:4dc9f7c3ebf022f4cd1f74f2c101e36245e09e8fa0cd39ce743f6c1fea07f8a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_005-1a, image: WYG0683/WYG0683-0599a.png}
body:
  text: 晉人法帖晉右軍將軍琅琊王羲之書舊列卷八今移改卷舊四十三帖今自六歸入一帖羲之死罪小大悉比來未惶不可懐未復臨海問懸情計賓命行應至遲卞公還具承問妹極得㪚力以為至慰期等故爾耳因縁不多白羲之死罪謹業右一帖草書六行五十七字不審定何日當北遇信復白遲承後問謹案右一帖草書二行十五字伏想清和士人皆佳適桓公十月末書為慰云所在荒甚可憂殷生數問北事勢復云何想安西以至能數面不或云頓歴陽爾耶無縁同為歎遲知問謹案右一帖草書七行五十八字運民不可得而要當得甚慮叛㪚謹案右一帖草書二行十三字頃為此足勞人意謹案右一帖草書一行七字八日羲之頓首多日不知君問得一昨書知君安善為慰僕比小差而疲劇昨若耶觀望乃苦輿上隱痛前後未有此也然一日一昔勞復不極以此為慰耳力不謹案右一帖草書六行六十二字得里人樂著縣户今送其名可為領受君頃就轉佳不僕自秋便不佳今故不善差頃還少噉脯又時噉麫亦不以為佳亦自勞弊㪚係轉久此亦難以求泰不去人問而欲求分外此或速弊皆如君言謹案右一帖草書十一行七十七字便大熱足下晚可耳甚患此熱力不具王羲之白謹案右一帖草書二行十九字此書因周常侍想必至謹案右一帖草書二行九字吾唯辨辨便知無復日也諸懐不可言知彼人已還吾此猶有小小往來不欲來者其野近當往就之耳不大思其方不見可久理而任之者悠然此可歎息謹案右一帖草書七行六十字得西問無他想彼人甚平安此粗佳元度來數日為慰謹案右一帖草書三行二十一字中郎女頗有所向不今時婚對自不可復得僕往意君頗論不大都此亦當在君耶謹案右一帖草書四行三十二字發瘧比日疾患欲無賴未面邑邑反不具王羲之白謹案右一帖草書三行二十字得書知問腫不差乏氣勿勿面近羲之報謹案右一帖草書二行十六字足下各如常昨還殊頓匈中淡悶干嘔轉劇食不可強疾高難下治乃甚憂之力不具王羲之謹案右一帖草書四行三十六字得書知足下問吾既不佳賢内妹未差延期謹案右一帖草書二行十七字須狼毒市求不可得足下或有者分三兩停須故示謹案右一帖草書三行二十字得書知問吾夜來腹痛不堪見卿甚恨想行復來修齡來經日今在上虞月末當去重熙旦便西與别不可言不知安所在未審時意云何甚令人耿耿謹案右一帖草書七行五十八字一昨得安西六日書無他無所知表亦復常言耳謹案右一帖草書三行十九字闊轉久勞想豈舍知足下常同之卒未近縁如何足下數令知問謹案右一帖草書三行二十五字十一月四日羲之白冬中感懐深始欲寒足下常疾何如不得近問邑邑吾故苦心痛不得食經日甚為虛頓力不及具王羲之白謹案右一帖草書五行五十字周益州送此邛竹杖卿尊長或湏今送謹案右一帖草書二行十五字不得執手此恨何深足下各自愛數惠告臨書悵然謹案右一帖草書三行二十字阮公故爾可憂時放恕大事今令速言何万守篤大灸不得力而從事以至甚無計自必出唯須小佳鐵石今出力救足下可復助且令得通謹案右一帖草書七行五十四字家月末當至上虞妹亦俱去謹案右一帖草書二行十一字此蒸濕難為人得示知足下故爾堪行想不成病耳吾至無賴行尅王羲之頓首謹案右一帖草書四行三十一字不得西問耿耿謹案右一帖草書一行六字丘令送此宅圖云可得􅞀畝爾者為佳可與水丘共行視佳者決便當取問其賈謝生多在山下不復見且得書疾惡冷耿耿想數知問雖得還不能數可歎不審比出日集聚不一爾緬然恐東旋未期諸情罔謹案右一帖草書十行八十字飛白不能乃佳意乃篤好此書至難或作復與卿謹案右一帖草書三行十九字羲之白昨故遣書當不相遇知君還喜慰足下時行想今善除猶耿耿僕時行以十一日而不除如比日便成委頓今日猶當小勝不知能轉佳不積不卿至劣劣力還不具王羲之白謹案右一帖草書七行七十字不審復何以永日多少看未九日當採菊不至日欲共行也但不知當晴不耳倫等還殊慰意増慨知足下疾患小佳當惠縁想示能果遲此善㪚非直思想而已也尋復有問足下以數示謹案右一帖草書九行七十二字由為諸力不具謹案右一帖草書一行六字月半哀感奈何奈何念邑邑罔極之至不可居處比日何似痺差不悒悒力知問王羲之頓首謹案右一帖草書四行三十六字知彼乃爾切切汝乃獨坐但有憂邑懸逺不能得遣人且吾無復久意果去當南視汝等也謹案右一帖草書四行三十五字一昨得安西六日書無他無所知説故不復付送讓都督表亦復常言耳如兄子書道嵩自必果今復與書督之足下勅令至並與逺書也謹案右一帖草書六行五十三字奉黄甘二百不能佳想故得至耳船信不可得不知前者至不謹案右一帖草書四行二十四字尊夫人不和想小爾今以佳念累息卿佳不吾故劣劣力知問王羲之敬問謹案右一帖草書三行二十九字日五期結極以大先師之言皆著推此言之無驗如此事君當欲知故及宜停宅謹案右一帖草書四行三十一字先生適書亦小小不能佳大都可耳謹案右一帖草書二行十四字三月十六日羲之白一昨省不悉雨快君可不万石轉差也灸得力不不得後問懸悒不去懐君云當有旨信遲望其至僕劣劣故遣不具還具示王羲之謹案右一帖草書七行五十九字取卿女聟為長史休種意何似耿耿謹案右一帖草書二行十四字適欲遣書云得示知足下得涼以為佳甚慰知多疾患念勞心吾故不欲食比來以為事恐不可久邑邑思面行故果之王羲之謹案右一帖草書五行四十九字此郡之弊不謂頓至於此諸逋滯非復一條獨坐不知何以為治自非常才所濟吾無故舍逸而能勞歎恨無所復及耳夏人事請託亦所未見小都冀得小差頃日當何理謹案右一帖草書八行六十六字行成旅以從是月也景風司至星火殷宵伯趙鳴而載陰爽鳩習而揚武時可以升高逺望禮可以出宿餞行有詔具寮爰開祖謹案右一帖草書六行四十九字昔人於閣帖羲之書多所譏評自米芾黄伯思已然卷中阮公帖有疑為梁人殷鐵石書者苐因帖内有鐵石字而蘇軾直云已將鐵石作逸少玩帖文唯須小佳鐵石為句蓋晉人多服金石藥此因其出而須藥故為求助耳若竟以為人名則何不署於札尾且按詞索解體義亦乖烏容傅㑹乎又安西帖卷中重見後一帖字數多而體亦不類殆兩札語意偶同不必執謝生帖為例刪其一也至此郡帖元章云是與王述書長睿謂逸少與述方隙不應於尺牘間自彰逋滯王㴻則謂右將軍辭郡時與人道情曲非與述者其説固優然以編此殿右軍諸帖為有見殊非篤論王著昧於考古隨所得為排類豈復具㣲意於其間哉縂計羲之書三卷凡百五十二帖較張彦逺所云唐太宗購大王書三千卷㪚佚已多則什一僅存不可謂非閣帖之力但帖内止収行草而不及正楷直俟元祐中秘閣續帖始有黄庭樂毅諸刻豈當時徵求未廣抑楷書真跡流傳視行草尤為難信耶御識釋文訂異王羲之小大帖比來從王㴻釋顧從義作以來又未惶從顧釋施宿作惟又臨海臨從黄諫釋海從㴻釋顧作諮誨又賓命從顧釋㴻云命當是禽存考又承問亦從顧釋承一作年非帖末罪字草法不可辨顧云鉤摹之失運民帖民從顧從義釋一作代非大觀合下頃為七字為一帖文義似相屬而筆法不同仍如舊多日帖比從施宿釋顧從義作似非又觀望從顧釋望或作宦非又乃苦亦從顧釋一作乃者非又一昔亦從顧釋或作一發非縣户帖首一字顧從義釋作鄉與草法不合一作得字體稍近姑從之又其名從顧釋名一作不非轉佳帖或從顧從義釋一作咸非大熱帖白字從王㴻釋顧從義作上非中郎帖往從顧從義釋一作徳非又論顧作冷亦作臨注云一作論按文法論字較合因從之比日帖不具從王㴻釋顧從義云當作有非又白亦從㴻釋延期帖賢從顧從義釋原缺上一筆當是鉤摹之失今從大觀補狼毒帖兩從顧從義釋王㴻云當是雨文義不協闊轉久帖同之從羅森釋劉次莊作得非冬中帖不具從顧從義釋王㴻作不一一阮公帖阮公從劉次莊釋顧從義云當是既月非王㴻云當是阮郎草法亦不甚合又何万從顧釋㴻云當作阿万玩草法不類阿字又大灸從顧釋黄諌作大惡非又得力從朱家標釋顧作將刀非又且字鉤摹稍有缺筆按絳帖合下月末蒸濕為一帖蒸濕帖字體不同月末則大小正類文法亦相屬存考丘令帖卌從顧從義釋羅森作州非又水丘亦從顧釋一作水近非遣書帖足下從劉次莊釋施宿作重慰非王㴻釋作之亦二字於文義不協又善除不除並從顧從義釋劉俱作保非又卿亦從顧釋澍云當是公採菊帖何以從王澍釋劉次莊作似顧從義作比俱非又菊從顧釋黄庭堅作藥非増慨帖想示之示劉次莊施宿作必顧從義云當作君朱家標作念俱與草法不合王㴻釋作示引行穰帖為證從之又遲從劉釋顧云當作返非又善㪚從顧釋㴻作節㪚月半帖邑邑從顧從義釋王㴻作足下按下字與草法不合獨坐帖果去諸家釋並同王㴻云按書法當是果者安西帖知從顧從義釋劉次莊作大非又都督亦從顧釋劉作都共非又督之同長史帖聟從顧從義釋聟與壻同顧引干禄字書為證劉次莊施宿分作知耳二字非又休種從劉釋按張溥所輯王羲之集以休種為句猶言為長史休之後耳種或作稚王㴻疑作腫俱非種下一字劉作知顧云當作不與草法文義俱不合疑是意字摹缺末一筆姑釋以俟考得涼帖比來從顧從義釋劉次莊施宿作以來又合二字作㡬俱非又邑亦亦從顧釋一作區區又面行從劉釋顧云疑作拜此郡帖自非非字舊缺一筆今從大觀補又未見從顧從義釋見劉次莊作忽施宿作免俱非又頃從王㴻釋顧作須非行成帖以從從顧從義釋以黄伯思作比非又殷亦從顧釋黄庭堅施宿陳與義俱作列非乾隆三十四年歲在己丑春二月奉敕校正宋淳化閣帖初搨模勒上石謹案第五卷共四十四帖一百八十九行一千五百三十四字欽定重刻淳化閣帖釋文卷五
