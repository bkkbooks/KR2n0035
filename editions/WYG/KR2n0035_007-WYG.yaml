front:
  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷七
  hash: sha256:74f96012c225cfaa8ffeaa11aeb17c4b96637865a258a155795bc94fdcaf26bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_007-1a, image: WYG0683/WYG0683-0617a.png}
body:
  text: 晉人法帖晉中書令琅琊王獻之書舊列卷十但標名今移改舊三十二帖今從前卷歸入八帖刪一帖移三帖入無名氏書前告先以陳事意必是更有家信未知期説見徳逺書所致人耶何可足念耶謹案右一帖草書五行三十字一月廿九日告仲宗奉世諸兒禍變無常謹案右一帖行書二行十六字黄門隕背哀痛摧剥不自勝任奈何奈何及書感塞父姑告謹案右一帖行草三行二十三字令外甥知問郗新婦更篤憂慮深謹案右一帖草書二行十三字承冠軍故爾不覺轉勝灸無所覺憂馳深汝燋悚可言謹案右一帖草書三行二十一字可必不耳企遲此大都如常秀順至慰意順心痛委頓燋勞謹案右一帖行草三行二十三字諸舍不能集㑹深哽塞仰料靜婢自常不和知從事甚簡致此佳也謹案右一帖行草四行二十六字吾當託桓江州助汝吾此不辨得遣人船迎汝當具東改枋三四吾小可者當自力無湖迎汝故可得五六十人小枋諸謝當有二便是見今當語之大理盡此信還具白胛痛可堪而以作書殆欲不可識謹案右一帖草書十行七十八字疾不退潛處當日深豈可以常理待之此豈常急急不審食復何如肌色可可所堪轉勝復以此慰馳竦耳謹案右一帖草書五行四十一字消息亦不可不恒精比經心向秋冷疾下亦應防也獻之下斷來恒患濕頭痛復小爾耳謹案右一帖草書五行三十四字省前書故有集聚意當能果不足下小大佳不聞官前逼遣足下甚急想以相體恕耳足下兄子以至廣州耶當有得集理不念懸心也耳謹案右一帖草書八行五十三字近與鐡石共書令致之想久達不得君問以復經月懸情豈可言頃更寒不適頗有時氣君頃各可耳遲㫖問僕大都小佳然疾根聚在右髀腳重痛不得轉動左腳又腫疾候極是不佳幸食眠意事為復可可冀非藏病耳謹案右一帖草書十一行八十五字知鐵石前往快作樂諸君善處世達於當年不復過此僕端坐將百日為尸居解日耳不知那得一㪚懐何其相思之深臨書意塞謹案右一帖草書六行五十字忽動小行多晝夜十三四起所去多又風不差腳更腫轉欲書疏自不可已唯絶歎於人理耳二妹復平平昨來山下差靜岐當還委曲前書具想勝常也諸人悉何如承冠軍定入計今向達都汝奉見欣慶但恐停日不多耳謹案右一帖草書十三行八十六字慶等已至也鵝差不甚懸心直道尋去奴定西諸分張可言謹案右一帖草書四行二十三字新婦服地黄湯來似減眠食尚未佳憂懸不去心君等前所論事想必及謝生未還聞尓進退不可解吾當書問也謹案右一帖行草六行四十四字鴨頭丸故不佳明當必集當與君相見謹案右一帖行草二行十五字不審阿姨所患得差否極令懸惻想東陽諸妹當復平安不審頃者情事漸差耶彼郡今載甚不能佳不知早晚至當遂至郡深想望謹案右一帖行草七行五十一字豹奴此月唯省一書亦不足慰懐深悉足下情素耳謹案右一帖草書三行二十字鄱陽書停諸舍便有月未具㪚騎書知情至草草未發遣奉去月問承婦等復不能差深憂慮耳謹案右一帖行草五行三十七字獻之白不審疾得損未極憂及更能出入未前書云至於㪚情㛐疾苦療得所深喜慰想必為問敬和晚際似差耶諸舍也能向諸弟各也謹案右一帖草書五行五十三字獻之白極熱敬惟府君此月内得書來時幾得問希此消息極悶悶軍中復何如患膿不能潰意甚無頼君有好藥必時復與府中多少極濟事耶謹案右一帖行草八行五十六字服油得力更能停噉麪只五六日停也不至絶艱辛也足下明當必果想即日如何深想憶謹案右一帖草書四行三十五字近奉阿姑告知平安極慰人意獻之遂不堪暑氣力恒惙恐是惡風大都將息近似小却謹案右一帖行草五行三十四字白承舍内分違近豫遂就難以喻痛濟理獻之白謹案右一帖行書三行十九字復面悲積蕃首以不佳耿耿僕近動㪚委頓雖轉折猶惙然發止尚以未定日冀以言居力還不復具謹案右一帖草書五行三十九字還此今有書何以至不知諸舍故多患念勞以今差也得領軍書故苦風丹楊書常疾動耿耿亦云得鄱陽近書為慰丹楊疾苦不果來甚悵恨謹案右一帖草書六行五十五字得西問不寇復云何令人邑邑具示謹案右一帖草書二行十四字獻之言月終伏惟哀傷不可任不審尊體諸患復何如悚息謹言疏不備獻之言謹案右一帖行書四行三十一字東家尚未欲下李參軍無政日有此議能自來此方寸無使聞上極不妙之事獻之頓首謹案右一帖行草五行三十四字八月十九日具䟽操之獻之再拜昨日諸願悉達奉奉告慰馳心極冷不審尊體復何如操之創故不差常惡乏故爾憒憒獻之昨來復下如欲作㿃殊乏極服石脂丸冀得力謹白不具操之等再拜謹案右一帖草書十行七十六字獻之白不審尊體復何如昨夜眠多少願盡寛喻理憂馳可復言若得消息者獻之謹案右一帖行草四行三十二字㛐等承更惡不審頃痊復不必湏㪚時終得力耶此藥甚佳想姊舉體不能行履服遂差安西且無恙府君屬有和稀久滯行路同人絶得此心故當擕其長㓜詣汝上下知彼駱驛有書示不足以慰吾意耶冬間必欲至足下所居承使君明練不謂漸有勝也君數集聚然其大都可耳吾止於月半間耶謹案右一帖行草十五行一百十六字鄱陽歸鄉承修東轉有理吾賢畢欲事必俟勝歡慰于懐耶吾終權宜至承今年饑饉仰惟年支都乏絶不謂乖又至於此耶吾脚尚未差極憂也謹案右一帖行草八行五十六字獻之等再拜不審海鹽諸舍上下動靜比復常憂之姊告無他事崇虛劉道士鵞羣並復歸也獻之等當須向彼謝之獻之等再拜謹案右一帖行草八行五十字鬱鬱澗底松離離山上苗以彼徑寸莖䕃此百尺條世胄躡高位英儁沈下僚謹案右一帖草書四行三十字侍書集子敬帖殽紊尤甚如潛處一帖上同右軍肥􅇤㣲分或可云臨橅父蹟若思戀冠軍二帖本人兩系豈當時全無讎校耶今從泉本大觀本各刪其一至章草蜀志諸葛亮傳中語前半已入古法帖而以後半屬之大令且妄増七月二日獻之白七字以史傳舊文訛為簡牘造作紕繆一何至是今悉歸併無名氏書列於末卷澗松三十字乃左思詩句伯思以為集書然太冲在西晉時以詠史著子敬或書先軰名什如蘇軾寫蔡襄嵩陽詩帖之類未可執成旅數行晉字唐文為例但與尺牘混列亦不倫因移卷尾又卷中鐵石兩見蘇軾並謂是殷鐡石姜䕫則以為謝鐵石按南史鐵石即謝鐵字為安石季弟與子敬時世正同且札内文義的係人名亦殊逸少帖語茲取䕫説義各有當也鵞羣帖黄米力斥為偽書更引劉宋崇虛觀元魏崇虛寺駁証自非過刻苐此帖故是名蹟真􅎓自可存而不論云御識釋文訂異王獻之徳逺帖足念耶從施宿釋顧從義作足下今耶文義不甚可解王㴻云當是與恐永問草法亦不甚合存考外甥帖令從顧從義釋劉次莊作念又知從顧釋劉作欲冠軍帖悚從大觀摹按此帖前後複見前作燋㥩後作燋悚大觀删去後帖而移悚字入此帖又可言從施宿釋顧從義作可耳江州帖辨與辦通諸家釋並同又改從劉次莊施宿釋顧從義作攻非又枋文彭云借作船舫之舫王㴻云東改枋恐是當時船名存考又者從顧釋黄諌作去又無湖地名晉地理志如此湖劉作御黄作仰俱非又有二從顧釋張溥無二字又以從顧釋一作比又殆諸家或作絶或作紀玩字體文義作殆為是轉勝帖此豈二字下各有一㸃當是誤鉤非重字也又常諸家釋同疑亦鉤摹有失又急急從顧從義釋黄諌作憂憂王㴻云筆法當作至至俱非消息帖比顧從義作以按文法當作比字體亦合又濕頭諸家或作頭項或作頭頂或作温頭字體文義俱不甚合王㴻作誤攻亦似牽強玩字義蓋患濕而頭痛也近與鐵石帖頃字俱從顧從義釋黄諫作須非又非從張溥釋顧云按書法當是章草狀字文義難通又臧從顧釋劉次莊施宿作藏非知鐵石帖達從施宿釋起筆多一小畫似是鉤摹之誤顧從義乃以上筆為一字或疑作遲俱非又那從張溥釋顧疑作邦非忽動帖晝從黄庭堅釋劉次莊作書顧從義作畫俱非又岐從顧釋或疑作政非慶等帖直從王㴻釋顧從義作宜又可亦從㴻釋㴻以為帶張字末一折作可字首筆古帖往往如此其説近理顧作少義難解新婦帖聞顧從義作可張溥作何字體俱不合按草法及文義當作聞字為是鄱陽帖承字起筆㣲闕極熱帖悶悶從顧從義釋王㴻云或以兩㸃連下軍字作暈按文義及草法俱不合又㴻以患膿以下四行别為一帖説亦未確舍内帖分違從張溥釋劉次莊作連顧從義作遣俱非復面帖居從王㴻釋一作首或作百俱非又具從顧從義釋劉次莊作耳施宿作乙乙領軍帖苦風從王㴻釋顧從義作在非又云得從施宿釋顧作足一作之俱非又疾苦亦從施釋顧作者西問帖寇從顧從義釋劉次莊作寢非諸願帖惡乏劉次莊作惡亦顧從義云當作念公王㴻云當是惡公文義俱難解玩義及字體似惡乏為近又憒憒從顧釋陳與義作快快非㴻作怏怏又殊乏從劉釋顧疑作口非又石脂諸家釋多作石的顧以泉本勹中有㸃為證按石的於義無當即勺字㸃全左半草法亦不合玩筆勢當是肉字偏旁必係脂字鉤摹之失而方書赤石脂主治㿃下較的字自為可據又得力從劉釋顧云當作之非又謹白從㴻釋顧作謹謹非尊體何如帖者從顧從義釋一作去非亦作告使君帖詣從張溥釋顧從義作諸非鵞羣帖海鹽從顧從義釋施宿作監雖字體相合但海鹽本呉郡地名若作監字便不得解葢由當時下筆率畧成訛不可執以為證也又當須從顧釋一作常須乾隆三十四年歲在己丑春二月奉敕校正宋淳化閣帖初搨模勒上石謹案第七巻共三十六帖二百三行一千四百九十九字欽定重刻淳化閣帖釋文卷七
