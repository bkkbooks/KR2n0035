front:
  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷一
  hash: sha256:370407fe6bfcf6f657952ea9337b1b3e9ce198487fdb1f588021e7c7d2bd5a22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_001-1a, image: WYG0683/WYG0683-0562a.png}
body:
  text: 歷代帝王法帖夏后氏大禹書舊標夏禹列卷五今從史例改題並移此出令聶子星紀齊春其尚節化謹案右一帖篆書二行十二字後漢章帝書舊止標漢今從史例增後字辰宿列張盈昃海鹹河淡鱗羽翔龍師火帝鳥官人皇始制文字乃服衣遐邇一體罔談彼短無恃已長尺璧非尚寸陰是競孝當竭力忠興溫若思慎終宜令學優登仕攝職從政都邑二京背芒面洛浮渭既集墳典亦謹案右一帖章草九行八十四字晉武帝書省啓知既下須防具具揚州實欲可可者比尚擬之動靜更啓也數遣信還謹案右一帖草書四行二十九字晉元帝書以下舊標東晉今從史例刪東字安軍未報平和之如何深可為事也謹案右一帖草書三行十四字八月九日睿頓首忽中秋但有遠懷便微冷恆何如比殊不能佳惟勿得慰抱念及不多司馬睿頓首謹案右一帖草書五行三十九字晉明帝書伏想墓次安隱守視文武平安謹案右一帖行楷二行十二字石本不釋今附録餘仿此晉康帝書陸女郎問訊如此可籌量之謹案右一帖行楷二行十一字今附録晉哀帝書不死罪死罪承中書郎君疢患比委瘵情以灼怛伏念垂心憂勞想得治力漸佳丕死罪死罪謹案右一帖行楷四行三十六字今附録晉簡文帝書昱白所示慶賜事具具此莫大之禮天下大慶得率由舊章慰答民望甚為盡善但奢則不適於時儉則陋而不典正當斟酌其宜令得會中耳謹案右一帖行楷六行五十五字今附録晉孝武帝書舊誤標東晉武帝今考正比得譙王書有欲仙語吾答之如别卿前云宜卿譙王參之於衆云公書卿私書君輒從衆以吾觀之寧當許也想所謂爾謹案右一帖行草五行四十七字宋明帝書鄭修容有兄喪今成服汝可令汝內人知之再報休祜休範二家內人知也彧報謹案右一帖行草四行三十一字齊髙帝書吾今至破堽在路粗可尋還遲見卿不遠願信知卿深意也謹案右一帖草書四行二十三字梁武帝書舊誤分武帝髙帝為二今併數朝腳氣轉動不得多有憂懸情也二謝處委曲復當有情故舊數有書問不可復有興也知何時再言話報之謹案右一帖草書五行四十三字衆軍行人最今封如别曹郢州近遣樊士真領三百人猶在漁湖其應用行合應有四千人故指白蕭衍疏謹案右一帖即舊列為梁髙帝書者也楷書五行四十一字今附録梁簡文帝書知康司馬卓以水淺未時發漢源冬涸理當有訪遄舟有及具意綱答謹案右一帖行楷四行二十七字今附録隋文帝書舊列卷五第十標隋朝法帖今移改皇帝敬問婺州雙林寺慧則法師朕尊崇聖教重興三寶欲使一切生靈咸䝉福力法師捨離塵俗投志法門專心講誦宣揚妙典精誠如此深副朕懷既利益羣生當不辭勞也猶寒道體如宜今遣使人指宣往意謹案右一帖行楷八行八十二字今附録唐太宗書舊二十三帖今併一帖移四帖入髙宗書兩度得大內書不見奴表耶耶忌欲恆死少時間忽得奴手書報娘子患憂惶一時頓解欲似死而更生今日已後但頭風發信便即報耶耶若少有疾患即一一具報今得遼東消息録狀送憶奴欲死不知何計使還具耶耶敕謹案右一帖行草十行八十七字懷讓患水邊身腫復利形勢極惡耶耶意多恐不濟遺愛勞發大重氣候似少可於豆盧亦似難差傷念不可言奴報其婦知也謹案右一帖行草六行四十九字使至辱書知公所苦少可慰意何言不知信復更復何似時氣漸冷善將息也所請景賢公即宜留聽追然後遣若無好藥更遣揀擇今為北邊動靜奉敕即行相去大近信使非遙實情欣怉耳遣無具李世民呈謹案右一帖行草十一行八十一字比者久嬰沈疾虛弊何言昨旦臨朝略無勞惙看此稍望平復未知於後何如且用慰心自怡而已昨夜痛發少覺勞弊所以不能相見若有事進敕十一日謹案右一帖行草十行六十字昨日來體履似漸可始聞卿不佳旦來何似敕謹案右一帖行草三行十八字三五日來漸望平復所以不能相見恐更勞發敕謹案右一帖行草三行十九字雅州只為造船急所以如此早與書莫聽急賊已至方發兵恐少敕謹案右一帖行草四行二十六字卿與道宗誰已得多馬明當至故遣問即報敕十四日謹案右一帖行楷二行二十一字今附録所疾者漸可不至憂耳謹案右一帖行楷一行九字今附録北邊始有表至甚無事故書相報敕謹案右一帖行草二行十四字八柱承天乾道由其廣運四維紀地坤元所以載安是知締搆經綸必佇風雲之佐燮諧樞宇咸資川嶽之靈故軒丘御扆六相宣其景化媯水乘時五臣濟其鴻業謹案右一帖行草八行六十三字數日來氣發今旦服一飲子不得相見有事進狀敕中書門下三品草七日謹案右一帖行草五行二十九字門下中書省及侍郎給事中舍人員外郎鎧曹參軍左右庶子明日移營向五橋南一二里著敕三日謹案右一帖行草五行三十九字數日來患痢今雖稍可猶自虛惙欲三五日將息諸司有事進狀敕十一日謹案右一帖行草五行二十九字昨令今旦引髙麗使人辭明日將來敕二日謹案右一帖行草三行十七字卿昨日道服蜀葵可録方將來敕草三日謹案右一帖行書二行十六字今附録唱箭處只道官號及姓不唱名不知是何人想且應合唱名敕三日謹案右一帖楷書三行二十六字今附録五言秋日斆庾信體嶺銜霄月桂珠穿曉露叢蟬啼覺樹泠螢火不溫風花生圓菊蘂荷盡戲魚通晨浦鳴飛鴈夕渚集栖鴻颯颯髙天吹氛澄下熾空謹案右一帖楷書六行五十八字今附録數年來每有征動雖復事非為已猶恐下有怨咨所以廢甘泉之遊履燋金之弊寧可違涼忍暑不能適己勞民想汝誠心惟吾是念自非孝情深結孰能以此為懷省書澘然益增感念善自將愛遣此不多哥哥敕謹案右一帖行草九行八十二字唐髙宗書舊八帖今歸入太宗四帖不審夜來胸氣何似想當漸散痢復斷未江叔所患竟不痊除奄然逝聞問悲痛哽咽何言想叔同氣之傷故當難處今故遣使往參具無委咨謹案右一帖行草七行五十五字叔藝韞多材慈深善誨藹夙奉趨庭之訓早擅臨池之工聞其比來復愛飛白昨故戲操翰墨聊以示藹慙六文之麗則異五際之芳詞忽往來書談飾過實顧惟菲迹非敢當仁披覽循環祗以增愧故斯表意餘不多云咨謹案右一帖行草十一行八十五字使至得所進枇杷子良深慰悅嘉果珍味獨冠時新但川路既遙無勞更送今者梅炎藻夏麥氣迎秋香飄蘭坂之風鏡轉桂巖之月為善之暇想足怡神延望白雲載深離緒聊疏緑字此不多申咨謹案右一帖行草九行七十六字太子無事欲僻洛城西門仗聽更不須覆奏敕草三日謹案右一帖行草三行二十一字過午將審行𢎞福及倉糧悵乏絶户數向衙裏來敕草五日謹案右一帖行草三行二十三字卿及文瓘處俊敬𤣥午前到九乾門來敕草九日謹案右一帖楷書二行十九字今附録錢事且莫宣出敕謹案右一帖行楷一行七字今附録六尚書及尚書左右承侍郎殿中將作少府司農等長官今日晚間並喚向衙裏來敕至德二日謹案右一帖行楷四行三十七字今附録昨日令卿等平章事遣作狀報何因不進敕六日謹案右一帖楷書二行十九字今附録使至知𤣥堂已成既得早了深以為慰不知諸作早晚總得斷手日月猶賖必須牢固數日來極熱卿等撿挍大應疲倦陵初料髙一百一十尺今聞髙一百卅尺不知此事虛實今因使還故遣相問敕十五日謹案右一帖行楷七行八十字今附録東都今年别稅草今既不去並停常稅草彼處應無用處且宜減納即早處分勿遲敕九日謹案右一帖行楷四行三十五字今附録今遣𢎞往東都逐生氣敬𤣥已下宫臣及隊仗至彼聽入於文思章善等門祗承啓事進食等物並聽其文思門宿衛處卿等共其相知撿挍敕更不須覆奏草六日謹案右一帖行楷六行六十三字今附録閣帖第一卷首列帝王於義當矣而禹書十二字散置卷五所應表出以冠簡端又隋朝法帖一則既屬制詞且考婺州沿革宜標文帝移入此卷至如司馬懿雖其子孫追尊宣帝而誼終魏臣與晉陳三王並當改就臣列其餘標題岐舛悉為訂正又唐太宗帖內多闌入髙宗書如江叔為太宗弟元祥藹為魯王靈䕫子乃髙宗從弟枇杷一帖則蔣王惲鎮蜀時事東都廢自武德復於顯慶終貞觀之世為洛陽宫正史具存皆可據以移定或以移營懷讓二帖亦髙宗書考永徽以後未親武事不當有移營之敕而豆盧懷讓與房遺愛皆文皇懿親豈得以開元僧名偶同妄生疑義其章草數行乃梁周興嗣千文中語不應後漢先有此書或亦如懷仁之集聖教序但章草著自章和以為章帝書理尚可通蓋此帖重在摹刻流傳其書之真僞固無庸深論耳御識釋文訂異謹按自宋陳與義奉敕校釋閣帖劉次莊刻戲魚堂帖始附釋文而施宿著大觀帖總釋姜䕫絳帖平今存六卷黃庭堅題跋間亦音注至明上海顧從義參訂諸家撰為閣帖釋文考異頗稱完備內府藏陳繼儒家舊搨本丹注字右本朝羅森朱家標各有刋本最後王澍纂閣帖考正凡十卷於筆法音義採輯辨證綦詳今擇諸家所長就篆草各體釋注行間其中或可兩存或應正其非者附訂如後夏后氏大禹書節化二字釋舊闕今從明李登托古遺文補釋晉武帝省啓帖既下既字不合草法别無可考姑從顧從義釋又具具從劉次莊釋施宿作具之又實欲可可從王澍釋劉作寒到有晉元帝安軍帖未報從顧從義釋王澍作未想中秋帖頓首下施宿重頓首二字又慰抱亦從顧釋劉次莊作慰愁宋明帝鄭修容帖彧明帝名從陳與義釋顧從義云一作感非唐太宗兩度帖欲恆從顧從義釋施宿作欲怕非懷讓帖氣候從顧從義釋劉次莊羅森朱家標俱作氣復非使至帖不知從顧從義釋劉次莊作不足又今為亦從顧釋劉作令為非又相去顧云一作相知非又欣怉亦從顧釋按怉音抱懷也施宿作悅或作悒俱非又無具舊釋闕今從陳繼儒釋顧作無乏王澍作無一一俱非雅州帖雅州從顧從義釋按造船云云與史事合劉次莊作稚州或作雍州俱非又万亦從顧釋羅森作一力王澍作方俱非八柱帖之靈之字缺波今從大觀帖補顧從義作下非數日帖三品從劉次莊釋顧云一作六誤移營帖從大觀合上作一帖又一二里從顧從義釋或合作三非數年帖潸然刻作潛然王澍云古通用字書雖無可考玩文義潸字為長潛或筆誤今訂正之唐髙宗江叔帖具從顧從義釋施宿作乙乙藝韞帖戲操從顧從義釋施宿作遽操非枇杷帖慰悅從顧從義釋一作至非又緑字亦從顧釋劉次莊作緣非乾隆三十四年嵗在己丑春二月奉敕校正宋淳化閣帖初搨模勒上石謹案第一卷共四十七帖二百二十九行一千八百四十九字欽定重刻淳化閣帖釋文卷一
