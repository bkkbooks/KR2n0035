front:
  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷九
  hash: sha256:1d02a81778778fd0c540618d91f82ae3712204553099a62cdce511f029d6d0de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_009-1a, image: WYG0683/WYG0683-0635a.png}
body:
  text: 陳至唐人法帖陳永陽王伯智書舊列卷一第十九今移熱甚汝習讀為勞吾疾劣遣不具伯智疏謹案右一帖草書三行十六字寒嚴比氣力何似僕疾劣甚情想遇今信旨此不多陳伯智疏謹案右一帖草書四行二十四字陳巴陵王叔慎書舊列卷一第十八誤長沙王叔懷今移改云須􅀈吾既不司此行極是園中梅始發既無工力治未花之與􅀈今付此不多叔慎答自足何用此花謹案右一帖行書六行四十字陳釋智永書舊誤入王羲之帖列卷七今移出承足下還來已久别欲參慰為染患不能得往問眷仰情深豈此委具乙兩日少可尋冀言展若因行李願存故舊今遇賢弟還得數張紙勞動幸不怪耳謹此代申不具釋智永謹案右一帖草書十行六十八字隋釋智果書舊列卷五第十一今移梁武帝評書從漢末至梁有卅四人王僧虔書猶如揚州王謝家子弟縱復不端正奕奕皆有一種風氣王子敬書如河朔少年皆充恱舉體沓拖而不可耐羊欣書似婢作夫人不堪位置而舉止羞澀終不似真阮研書如貴胄失品次不復排突英賢王儀同書如晉安帝非不處尊位而都無神明殷均書如髙麗人抗浪乃不有意氣而姿顔自乏精味徐淮南書如南岡士大夫徒尚風軌然不寒乞陶隱居書如吳興小兒形狀未成長而骨體甚峭快吳拖書如新亭傖父一往似揚州人共語語便態出柳産書如深山道士見人便欲退縮曹喜書如經論道士言不可絶王右軍書字勢雄強如龍跳天門虎臥鳳閣故歷代寶之永以為訓蔡雍書骨氣洞達爽爽如有神力程曠平書如鴻鵠弄翅頡頏布置初雲之見白日蕭思話書如舞女低腰仙人嘯樹李鎮東書如芙蓉之出水文彩如鏤金桓玄書如快馬入陳隨人屈曲豈須文譜范懷約真書有分草書無功故知簡牘非易皇象書如韻音繞梁孤飛獨舞孔琳之書如散花空中流徽自得李巖之書如鏤金素月屈玉自照薄紹之書如龍遊在霄繾綣可愛秦獄吏程邈善大篆得罪始皇雲陽獄增減篆體志其名名其書目𨽻也扶風曹喜後漢人不知其官善篆及𨽻篆等少異李斯見重一時耶鍾司徒書字有十二種意外巧妙絶倫多奇崔子玉書如危峰阻日孤松單枝邯鄲淳書應規入矩方圓乃成師宜官書如鵬翔未息翩翩而自逝梁鵠書如龍威虎震劔拔弩張張伯英書如武帝愛道憑虛欲仙衛恆書如插花舞女援鏡笑春索靜書如飄風忽舉鷙鳥乍飛鍾繇書如雲鶴遊天羣鴻戲海行間茂密實亦難過耶謹案右帖五段行楷共四十九行五百六十九字唐祕書少監越州虞世南書舊列卷四第九今移世南聞大運不測天地兩平風俗相承帝基能厚道清三百鴻業六超君夀九霄命周成算元無之道自古興明世南謹案右一帖楷書五行四十五字今附録世南從去月草七八率一兩日行左腳更痛遂不朝會至今未好亦得時向本省猶不入內冀少日望可自力脫降訪問願為奉答虞世南咨謹案右一帖行草六行五十四字賢兄處見臨樂毅論便是青過於藍欣忭無己數願學耳世南近臂痛廢書不堪覼縷也虞世南呈十三日遣書謹空得書為慰可言也謹案右一帖行草八行五十二字疲朽未有東顧之期唯增慨歎今因使人指申代面必得力也謹案右一帖行草四行二十四字鄭長官致問極真而其三人恆不蕩蕩將如何故承後時有所異責謹案右一帖行草三行二十六字潘六云司未得近問莫耶數小奴等計不日當有狀來謹案右一帖草書三行二十一字唐太子率更令長沙歐陽詢書舊列卷四第十但標率更令今移增貞觀六年仲夏中旬初偶詣蘭惹猥辱見示諸家書遍得看尋可以頓醒滯思各甚嘉妙今昔孰為比肩至於興歎耳珍珍重重因書此敘于其後渤海郡率更令歐陽詢記之謹案右一帖行書七行六十七字靜而思之勝事莫復過此氣力弱猶未愈吾君何當至速附書必向饒定須寄信立具歐陽詢呈謹案右一帖行草四行三十七字五月中得足下書知道體平安吾氣力尚未能平復極欲知君等信息比憂散散不可具言不復歐陽詢頓頓首首謹案右一帖行書五行四十四字足下何當定返還人望示心曲永嘉書處定難以為其心也謹案右一帖行書三行二十三字比年守疾病無事絶心氣至於書處焉並昔時既言必求然顯數字豈能備矣須將示之十五日歐陽詢謹案右一帖行楷五行四十字今附録吾自腳氣數發動竟末聽許此情何堪寄藥猶可得也謹案右一帖行草三行二十一字唐中書令錢唐褚遂良書舊列卷四第八不紀時代今移增潭府下濕不可多時深益憒悴况兼年暮諸何足言疾患有增醫療無損朽草枯木安可嗟乎自離王畿親故阻越每思宿曩寧喻於心承汝立行可謨出言成軌遷居要職擢任雄臺聞之嘉聲增以羡慕更得汝狀重美吾誠因奏事間方便在意徙居此土深成要佳汝悉也五月八日舅遂良報薛八侍中前謹案右一帖行書十二行一百十八字家姪至承法師道體安居深以為慰耳復聞久棄塵滓與彌勒同龕一食清齋六時禪誦得果已來將無退轉也奉别􅀈爾踰卅載即日遂良鬚鬢盡白兼復近歲之間嬰兹草土燕雀之志觸緒生悲且以即日蒙恩驅使盡生報國塗路近止無由束帶西眺於邑悲罔更深因姪還州慘塞不次孤子褚遂良頓首和南謹案右一帖行書十三行一百二十一字山河阻絶星霜變移傷搖落之飄零感依依之柳塞煙霞桂月獨旅無歸折木葉以安心採薇蕪而長性魚龍起沒人何異知者哉褚遂良述謹案右一帖行楷五行五十四字唐太子司議郎吳郡陸柬之書舊列卷四第十六標東宫長史今移改近得告為慰上下無恙恙不得吳興近問懸心得藥書散勢耿耿嘗也謹案右一帖草書四行二十七字唐廣平太守東海徐嶠之書舊列卷四第十五標洺州刺史今移改春首餘寒惟闍梨動止安隱弟子虛乏謬承榮寄蒙恩奬擢授洺州一歲三遷自南徂北既近都邑忝竊彌深戰懼之情慙惶據便即祇命末由頂謁瞻望山門但增悽斷願珍重忩忩不宣弟子徐嶠和南謹案右一帖行草八行七十八字唐諌議大夫錢唐褚庭誨書舊列卷四第十三今移辭奉後不辱問實增馳係初寒惟動履休勝庭誨推前耳未由拜展悠悠下情惟珍厚人信惠問通法師往謹附狀不宣謹狀謹案右一帖行書五行四十八字唐禮部尚書汾隂薛稷書舊列卷四第十四標尚書郎今移改孫權與介象論膾象以魚為上權曰此出海中安可得象乃庭中作坎置水投以鈎餌不經食得魚付厨謹案右一帖行楷四行四十二字唐北海太守江都李雍書舊列卷四第十二但標名今移增三數日晴頓熱若為自適也僕少理欲使小兒入京當從澧州去有書不示之諸公歎賽無九百之事當不復爽也故使馳問不具李雍白十二日差無多事撿挍來一言集耳通長孫五郎謹案右一帖草書九行七十二字唐將作少監趙郡李陽冰書舊誤史籀李斯列卷五第四第五今移改揚州裴易德系謹案右一帖篆書二行六字田疇耕耨為政期月而致法令使父子為鄒魯謹案右一帖篆書四行十八字唐校書郎廣平宋儋書舊列卷五第七但標名又不按時代今移增並改自一接拜情同弟兄沈吟緬懷固非小子之所勤及也策質前謝恐乖昔賢共弊之道晦事勿語且絶詩人匪報之實遲佪循軀偭俯未已殆將有辰矣足下多可不怪髙情內含如筠斯清比蕙又暢儋不以感氣厚而修詐自廣不以撫己多而私頌作德未致力謝馳懷宣書何陳萬一也悚息今秋盡野外草木變衰長郊蕭條風物凄緊清都久客莫復相親足下退食公庭睡罷私室櫛沐晞景收視解聽豈念嵗華不待厭倦為旅之士哉頃者釀玉初令絃絲正調竟欲左攜鄭君幽指藥妙右對董叟髙談道微情酣世忘浩去塵粃思足下能順試實其事為何如哉時聞真聲迥間笙鶴此復異於人境耳可以息宴可以嘯歌久不間然期今日之事也倚候騎氣自豫光臨幸甚謹馳疏不得具宋儋白謹案右一帖行草二十一行二百六十九字閣帖署名有不考帖字而誤者陳書載巴陵王叔慎長沙王叔堅王著訛讀慎為懷妄附長沙封爵有不顧帖字而誤者代申帖明標智永而入之右軍卷內有膺古而誤者李斯書十八字乃李陽冰篆王密所撰河東裴公紀德碣之文而史籀書六字亦碑額中事顧以溷託周秦不值一噱有眯古而誤者宋儋當唐開元時有嵩山圭禪師等碑乃不紀時代上厠斯邈其失考實甚黃伯思秦觀樓鑰輩後先刋駮確有據依今悉於卷中改正至智果書五段前後敘次參差大觀合為一通亦殊未當其書評或以為梁武或以為袁昂迄無定論考墨池編載武帝書評三十七人與此正同惟字句小異特首云三十四人而帖中重出曹喜鍾繇又增程邈實祇三十人耳其布字大小不倫或謂之子母體然古不經見且不應狂怪乃爾細玩書迹真行草章無一不備其中復字筆勢略相似疑亦聖教序之類集書為之者若山河一帖乃集褚書枯樹賦字而成但别出星安性哉四字而帖尾褚遂良述又集書者妄增因從右軍行成帖例移置河南簡末御識釋文訂異陳叔慎書極是二字從劉次莊釋顧從義云是字疑又園字與􅀈之􅀈皆摹失又叔慎從史考正顧作叔懷非智永書别從薑夔釋一作子非顧從義作早又智永從劉次莊釋顧同邢侗云是智果非智果書自乏從袁昂評書訂正顧從義作足非又風軓亦從袁訂按字書軓與範同薑夔及顧俱作軌非又吳拖從顧釋王澍作施又經論之論言旁甚明顧作綸非又懷約從顧釋一作均非又志其名之志從薑夔釋顧作忠蓋因上畫右旁鉤摹連筆之誤又援鏡之鏡因避宋諱缺末一鉤大觀全又索靜顧云當作靖靜靖古通用虞世南去月帖率從顧從義釋王澍云當是牽字體雖稍合而義不可解又兩日亦從顧釋或合兩日二字作曹非又望可從施宿釋顧作耳非賢兄帖學從顧從義釋劉次莊作孝非王澍云當作存而深辨草法與學不合備考又耳澍云當是之義亦通東顧帖得力從王澍釋顧從義作公力或作卿力於文義皆不甚可解鄭長官帖恆從顧從義釋劉次莊作垣非歐陽詢蘭惹帖蘭惹上一字顧從義釋作諸義不可解按字體似詰而文義當是詣蓋鉤摹少失耳因釋作詣存考靜思帖定須從劉次莊釋施宿作願顧從義云當作頃又立具從顧釋劉次莊合二字作意足下帖何當從顧從義釋一作嘗褚遂良潭府帖足言從劉次莊釋顧從義云當作去意於義難通又汝狀之狀從顧釋或作兆非又重美二字顧釋脫去家姪帖􅀈即倐字從顧從義釋按倐本作倏一作獯誤山河帖折從顧從義釋徐嶠之書止從王澍釋云偶多一畫顧作正非薛稷書二字不載字書顧從義云二字一義恐通用殊未必然按二字三國志俱作鯔音兹二字蓋作書時偶未經意之誤李雍書欲使之使從顧從義釋鉤摹微誤按十二日以下似另一帖而帖末語又似未了者因無可考姑仍舊李陽冰揚州帖揚從王澍釋顧從義云碧落碑有唐之唐正與此同但顧竟釋作唐亦自未可劉次莊作楊施宿作剔俱非宋儋書且絶之絶從劉次莊釋顧從義云當作紀非又不得具從顧釋王澍云當是不復一一筆駛直下故有似得存考乾隆三十四年歲在己丑春二月奉敕校正宋淳化閣帖初拓模勒上石謹案第九卷共二十八帖二百一十五行二千零二十四字欽定重刻淳化閣帖釋文卷九
