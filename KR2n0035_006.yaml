  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷六
  hash: sha256:f2f888a1a83c190493bddac0e71b73780ecbc68786891be2c58c1d66f6f938dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_006-1a, image: WYG0683/WYG0683-0607c.png}
body:
  text: 晉人法帖晉散騎常侍琅琊王恬書舊列卷三第二十四標中書令今移改得示知足下問吾故不差殊劣劣力不具王恬白謹案右一帖草書二行十九字晉領軍琅琊王洽書舊列卷二第九標中書令今移改洽白辱告承問洽故爾劣劣冀以復敘還白不具王洽再拜謹案右一帖草書三行二十三字洽頓首言不孝禍深備豫嬰荼毒蔭恃亡兄仁愛之訓冀終百年永有慿奉何圖慈兄一旦背棄悲號哀摧肝心如抽痛毒煩寃不自堪忍酷當奈何痛當奈何重告惻至感增斷絶執筆哽涕不知所言洽頓首言謹案右一帖行書七行八十一字洽頓首言兄子號毁不可忍視撫之摧心發言哽慟當復奈何奈何洽頓首言謹案右一帖行書三行三十字洽白向感塞不成敘得告承問殊乏劣白不具王洽再拜謹案右一帖草書二行二十二字晉吳國內史琅琊王劭書舊列卷三第十八標尚書今移改劭白明便夏節哀慕崩摧肝心抽絶煩寃彌深不自忍任痛當奈何當復奈何得告為慰腫轉差勞悴勿勿力及不次王劭再拜謹案右一帖行書五行四十九字晉中書令太原王坦之書舊列卷三第十二但標名今移增坦之惶恐言不知已與謝郎論坦之事未其意良不了者今當詣公自陳願告坦之惶恐言謹案右一帖行草四行三十五字晉鎮軍將軍高平郗愔書舊列卷二第十四標侍中今移改九月七日愔報比得章知弟慚佳至慶想今漸勝食進不新差難將適猶懸憂遣不具愔報謹案右一帖草書五行三十五字草四日愔報比書想悉達日涼弟佳不及數字愔報謹案右一帖草書二行二十字逺近何他王右軍竟去不付石首干一節謹案右一帖草書三行十六字想親親悉如常敬豫何當來耶道祖故未善差恆在尚書不見來多日謹案右一帖草書四行二十七字晉臨海太守高平郗超書舊列卷二第十五標中書郎今移改超言逺近無他説苟異問者定虛耳云段龕歸順不知審不王江州為宗正似已定前所傳者虛妄耳異同自旨啓超言謹案右一帖行楷五行四十六字今附録晉會稽內史琅琊王凝之書舊列卷三第十五但標名今移改八月草九日告庾氏女明便授衣感逝悲歎念增逺思得郗中書書説汝勉難安隱深慰懸心漸冷産後何似宜佳消息吾並更不佳憂之遣不次凝之等書謹案右一帖行草七行六十字晉黃門侍郎琅琊王徽之書舊列卷三第八標黃門郎今移改得信承嫂疾不減憂灼寧復可言吾便欲往恐不見汝等湖水泛漲不可渡遂復隔絶不然尋已往彼故遣疏知吾逺懷不具徽之等告謹案右一帖草書七行五十二字晉豫章太守琅琊王操之書舊列卷三第十四但標名今移增操之等白得識婢書慰意知年光數問可不不得薑順消息懸心操之等白謹案右一帖行草三行二十九字晉爵無考琅琊王渙之書舊列卷三第十三但標名今移增渙之等白不審二嫂常患復何如馳情倫直等平安計嫂倫奴已應在道企遲適東五日動靜最差速姑如復小勝冀遂和耳猶不寧餘上下故常患反側此悉佳渙之等白謹案右一帖行草八行六十六字晉中書令琅琊王獻之書舊列卷九但標名今移增舊三十九帖今刪一帖移一帖入無名氏書又截八帖併入卷七相過終無復日悽切在心未嘗暫撥一日臨坐目想勝風但有感慟當復如何常謂人之相得古今洞盡此處殆無恨於懷但痛神理與此而窮耳盡此感深殆無冥處常恨況相遇之難而乖其所同省告不覺滻流既已往矣亦復何言獻之謹案右一帖行草十一行九十二字諸舍復何如吾家多患憂面以問慰情不知可耳謹案右一帖草書二行十九字承永嘉比復患下上下諸疾患乃爾燋馳豈可懷不審今復何如嫂即平和耳貞壽不成病不謹案右一帖行草四行三十六字鵝還慰姊意今已當向發分張諸懷可言殊當復憂懸婢腹痛見差不劉家疾患即差秀已還也謹案右一帖草書五行三十七字諸女無日事懸心阮新婦何日至慰姊目下謹案右一帖草書二行十七字獻之死罪授衣諸感悲情伏惟哀慕兼慟痛毒難居見徐俊并使君書承比極勝但承此凶問當復大頓耳比曰憂馳無復意不審尊體云何腳及耳痛氣得此哀號何如先大惡時灸創特不堪此不乃為患眠食幾許使君今地實難為識然所以為識政在此耳謹案右一帖行草十二行一百字獻之白奉别告承安和慶慰極冷不審尊體復何如獻之比日如復小勝因夜行忽復下如欲作帶今服藥盡溫燥理冀當可耳然異極都不得復小失和卿惡亦不復得妄近生冷體氣頓至此令人絶歎行有佳酒便服謹案右一帖草書十一行八十四字想彼悉佳汝復見諸女不此上下故爾耳謹案右一帖草書二行十六字獻之白承承姑比日復小進退其尓不得一極和憂悚猶深不審以服散未必得力耳比驎相聞故云惡懸懷使君數得書也謹案右一帖行草六行四十八字獻之白思戀觸事彌至獻之既欲過餘杭州將若比還京必視之來月十左右便當發奉見無復日比告何喻願復盡珍重理獻之白謹案右一帖行草六行五十一字獻之白節過歲終衆感纒心伏惟同之奉月初告承極不平復頭眼半體疹恆惡兄告説姊故殊黃瘦憂馳可言寒切不審尊體復何如眠食轉進不氣力漸復先耳遲復旨告獻之故爾獻之謹案右一帖行草八行七十三字願餘餘上下安和知婢日夕疏慰意育故羸懸心倪比健也適奉奉永嘉去月十一日動靜故常患不寧諸女無復消息獻之謹案右一帖草書七行四十八字再拜夏節近感思深惟窮號崩絶不可忍處晴快不審體中何似食噉復多少甚馳情不審諸舍復何如未復西動靜不寧此多患反側願深寬勉故承問謹案右一帖行草七行五十九字思戀無往不慰省告對之悲塞未知何日復得奉見何以喻此心唯願盡珍重理遲此信反復知動靜謹案右一帖行草五行三十九字十二月草七日具疏操之獻之再拜歲盡無復日感思兼懷不自勝兄亦同之奈奈何何奉十二日告承承掾安和慰馳情姊三兄諸患故爾不損憂馳晴快不審尊體並復何如遲復來告操之故平平已再服散冀得力獻之亦惡憒勿謹白諸不具操之等再拜謹案右一帖行草十一行一百字衛軍猶未平和而哀勞殊未得盡消息理常以不寧僕射得散力甚慰表解臺職不知得恕不復冠軍告懸企謹案右一帖行草五行四十二字獻之白兄靜息應佳何以復小惡耶伏想比消息理盡轉勝耳礜石深是可疑事兄喜患散輒發癰勢為積乃不易願復更思獻之唯賴消息內外極生冷而心腹中恆無他此一事是差但疾源不除自不得佳論事當隨宜思之也獻之謹案右一帖行草九行九十字姊性纒綿觸事殊當不可獻之方當長愁耳謹案右一帖草書二行十七字獻之白不謂鄱陽一門艱故至此追尋悲惋益不自勝奈何奈何政坐視其滅盡使人悲熟賴子高在此不爾無可成獻之謹案右一帖草書六行四十七字阮新婦勉身得雄甚善散騎殊當喜也謹案右一帖草書三行十五字雖奉對積年可以為盡日之歡常苦不盡觸類之暢方欲與姊極當年之足以之偕老豈謂乖别至此諸懷悵塞實深當復何由日夕見姊耶俯仰悲咽實無己巳唯當絶氣耳謹案右一帖草書九行六十七字夏日感思兼悼切割心懷痛當奈何奈何得思道書慰意薄熱汝比各可不吾並故諸惡勞益勿勿獻之白疏謹案右一帖行草四行四十二字獻之白思戀轉不可言瞻近而未得奉見但有歎塞遲諸信還具動靜獻之白謹案右一帖行草四行三十字白東告具天寶疾患問何其倉卒乏子孫常欣倫早成家以此娛上下豈謂奄失此女愍惜深至惻切心懷嫂哀念當可為心情願不可保使人惋惋悲政當隨事豁之耳嫂先積弊復有此痛心不審不乃惡不甚以憂馳眠食復多少願遣無益盡消息理謹案右一帖行草十一行九十七字吾十一日發吳興違逺兄姊感戀無喻慶等别不可言比奉告故多患姊經感極頓憂馳益深適咨議十六日謹案右一帖行草四行四十二字告風疾故爾反側餘可行未東動靜不寧五宜速吳與丞别兄進猶戀罔勞亦極惡馳情二女晚生皆佳未復華薑疏比來得直疏故惡故足當視華也汝兒女並可不謹案右一帖行草七行六十四字草九日獻之白昨遂不奉恨深體中復何如弟甚頓勿勿不具獻之再拜謹案右一帖行草三行二十八字承服腎氣丸故以為佳獻之比服黃耆甚勤平平耳亦欲至十齊當可知謹案右一帖行草三行二十八字得書為慰吾先夜遂大得服湯酒諸治漸折故頓極難勞知足下便去不得面别悵恨深保愛臨書增懷王獻之謹案右一帖草書五行四十三字慕容有易賴意耶謹案右一帖草書二行七字薄冷足下沈痼已經歲月豈宜觸此寒耶人生稟氣各有攸處想示消息謹案右一帖行草三行二十八字益部耆舊傳今送想催驅寫取耳慎不可過淹留吾去月從孫家求信信次頓爾頻為亂反側餳大佳柳六惠言餳可常餌亦覺有益耳謹案右一帖草書六行五十二字王氏寶章世傳書迹今卷中所列多屬琅琊惟坦之系出太原宗派各異雖其父述為逸少同官序次應居洽劭後而王著因其名相似以厠凝之兄弟間幾如右軍子姓失考甚矣若凝之書帖乃告女之詞而末署某等與第二卷謝万帖款稱父疏而簡首自名同滋疑義或好事者妄為增益則不可知薑夔乃謂已行之女待以客禮稱名臆度無據且於万與兄子帖又何説以處焉獻之書雖不逮羲而石墨流傳正爾多多益善乃昔人評以為偽託者頗復不少如元度以下四帖黃庭堅米芾黃伯思皆斥之考元度帖中仁祖為謝尚字尚事在升平前獻之方當髫齔安得作書論時事伯思之説當矣至慕容一帖語意脫漏不可曉獻之時南燕再興或札論偶及亦所應有薄冷兩行迹類歐書究無明證益部耆舊傳乃陳壽所著壽生蜀仕晉撰述擅名送催寫取亦當時雅尚應爾今改元度帖入無名氏書後三帖則仍其舊悉徵實以為定論云御識釋文訂異王恬書不具從劉次莊釋施宿作不一一或作少合非王洽承問帖還白從薑夔釋顧從義作還日非仁愛帖豫從施宿釋劉次莊作紛非按豫字於上下文義無當草法亦不合施注疑是後人署名側注誤摹入行鉤勒復失似為近理薑夔絳帖平無此字益可為本非帖文之證王垣之書已與從薑夔釋顧從義作興非又良不了者亦從薑釋良一作斷非了王澍疑作可郗愔至慶帖今從薑夔釋顧從義作令非又進薑顧釋並同一作逢非比書帖達從薑夔釋一作連或作違俱非遠近帖何他從薑夔釋他顧從義作也一作地草法俱不合又干與乾通此帖顧及劉次莊俱與上二行誤合為一按上帖末已署愔報且兩帖字體不類大觀分列為是薑釋亦同敬豫帖親親薑夔顧從義釋並同下親字劉次莊作今或作乙乙王澍作一一以羲之帖證之薑顧釋為長又未善亦從薑釋或作未曽非王凝之書勉與免同薑夔引漢書免身為證又漸冷從薑釋顧從義同施宿作微非王徽之書可言從顧從義釋劉次莊作可耳或作可可俱非王操之書帖末等白從施宿釋玩字體等字草法甚明帶筆點注正白字耳且與帖首相合顧從義作頓首非王渙之書上下從薑夔釋施宿合二字作叔非王獻之相過帖撥從施宿釋陳與義同顧從義作掇又冥從顧釋施作置又滻從施釋按字書滻出涕貌顧作灌非又矣從張溥釋文義是而草法不合應是鉤摹之誤顧云當作員非鵝還帖已當殊當俱從施宿釋陳與義同顧從義並作嘗非按王澍以鵝還五行與前承永嘉四行合為一帖而辨劉次莊合諸舍永嘉二帖為一之非玩諸舍二行字體與永嘉以下不相類帖本與顧釋文可耳二字適當行盡原不必強合為一若鵝還則王氏尺牘用標帖名張溥詳辨之文義亦不甚相屬澍説似未足據也授衣帖及耳從王澍釋顧從義作可非帖內患字鉤摹小失安和帖復何如之如從劉次莊施宿釋顧從義作必非又行有佳酒從顧釋張溥同行黃諫作何酒劉作治俱非承姑帖承承從顧從義釋張溥無下承字存考又以服從劉次莊釋以與已同顧作比非餘杭帖見從張溥釋顧從義作兄非節過帖復先從劉次莊釋猶言復舊也施宿陳與義作充顧從義疑作克草法俱不合願餘帖上從顧從義釋一作近非劉次莊以適奉以下四行另為一帖顧合為一玩筆法相似張溥亦合載顧説為優珍重帖慰從顧從義釋王澍云當作至存考歲盡帖惡憒從劉次莊施宿釋顧從義作忘或作忌俱非又謹白諸不具從王澍釋白顧作拜諸顧作疏衛軍帖告從劉次莊釋張溥同顧從義疑作首非礜石帖當從施宿釋劉次莊作常又獻之二字雖署名減筆不宜如此省便當是鉤摹小失姊性帖殊當從陳與義釋劉次莊作常顧從義以此兩行合上為一張溥分列二帖王澍以前帖末有獻之字文義已完筆法亦與前不類當别是一帖其説為當阮新婦帖勉與免同又殊當從施宿釋顧從義作常奉對帖觸類從張溥釋顧從義作頗非王澍云當作額又與姊之姊闕中一筆當由鉤摹之失又乖别從顧釋黃伯思作乖反又俯仰亦從顧釋施宿作纒綿按此二字草法俱不甚合亦鉤摹小失苐俯仰義較長張溥釋同因從之又唯當亦從顧釋劉次莊作常非夏日帖奈何中一拂王澍云當是重奈何字張溥同思戀帖奉見從顧從義釋或作具非又信還從張溥釋顧以信為作誤又帖末白字從施宿釋天寶帖乏從顧從義釋一作令非又政當亦從顧釋劉次莊作常非又惡亦從顧釋王澍云上畫鉤摹失吳興帖經感從顧從義釋經王澍云當作纒玩字體經字甚明似無可疑又五宜亦從顧釋五張溥作吾澍説亦同當是鉤摹脫誤又吳與從顧釋澍云與草書興字存考又未復亦從顧釋一作未後非又故足亦從顧釋張溥同澍疑作云腎氣丸帖齊與劑通湯酒帖湯酒從顧從義釋王澍以二字相混顧釋亦臆決然不能定為何字而張溥以此標帖名似為可據又悵恨亦從顧釋張作怏益部帖取耳從張溥釋王澍同顧從義作了又信下疊字從顧釋劉次莊但作求信次非又餳大佳以下澍云當别是一帖顧張皆合為一存考乾隆三十四年歲在己丑春二月奉敕校正宋淳化閣帖初拓模勒上石謹案第六卷共四十八帖二百五十五行二千一百六十八字欽定重刻淳化閣帖釋文卷六
