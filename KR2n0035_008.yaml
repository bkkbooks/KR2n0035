  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷八
  hash: sha256:7cfa9b0889315a687664bf025b8ed5069c9e2bd2f288295fd05090db17f87441
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_008-1a, image: WYG0683/WYG0683-0625a.png}
body:
  text: 晉至梁人法帖晉散騎常侍琅琊王珣書舊列卷二第十一標司徒今移改三月四日珣頓首末冬衆感得七月書知問定何如就弊憂之劣不具王珣頓首白謹案右一帖草書四行三十二字晉中書令琅琊王珉書舊列卷二第十標司徒今移改珉頓首頓首此年垂竟悲懷兼割不自勝奈何奈何寒切體中比何似甚耿耿僕疾遂不差眠食少憂深遣書不次王珉頓首頓首謹案右一帖行草六行五十字十八日珉白比二書暫至未更近問懸情不適比可不吾羸疾故爾憂深力書不具王珉敬問謹案右一帖草書四行三十六字何如僕故頓弊力書不次王珉頓首頓首上下何如僕上下上下大都䝉恩得書慰之吾具謹案右一帖行草四行三十五字今欲出耳吾此月亟盡草四是王濟祖日欲必赴卿可尅過明吾當下解相待臨出亦遣報既至王家畢卿可豫檄光公令作一頓美食可投其飯也王珉敬報謹案右一帖草書七行六十一字晉司徒左長史琅琊王廞書舊列卷三第二十標司徒今移改告誘靜媛靜儀靜婔此晦便當假葬永痛抽剝心情分割不自勝念汝等追痛摧慟纏綿斷絶何可堪任痛當奈何當復奈何遣悲涕不次廞疏謹案右一帖行草六行五十五字晉東海太守下邳張翼書舊列卷三第二十一但標太守今移增草三日賴郎翼頓首節過多懷得近書為慰意比何如深勞弊頓曳力還不具謹案右一帖草書三行三十字晉中軍將軍琅琊王循書舊列卷三第五但標名今移增七月草四日循詹頓首秋月感思深得近示為慰餘熱比復可不僕疾患故爾不平復頓勿力書不盡王循詹頓首謹案右一帖草書五行四十四字晉御史中丞沛國劉瓌之書舊列卷三第十一但標名又脫之字今移增瓌之頓首頓首末陽逺感閏知有患耿耿知以自屈恨不相見力及不比望瓌之謹案右一帖草書四行三十字晉西中郎將潁川陳逵書舊列卷四第七誤陳時人但標名今移改以下四人世次無考附於晉代之末十二月草五日逵白歲終感慘寒切足下何如遣不悉陳逵謹案右一帖草書三行二十三字伯禮啓明願問訊兄前許借介纛今遣請受願付令往仰干悚息謹啓謹案右一帖行草三行二十七字晉吳興太守吳郡沈嘉書嘉字長茂舊誤嘉長列卷三第三但標太守今移改十二月十三日嘉頓首頓首歲有感懷深寒切想各平安僕勞弊遣不具沈嘉頓首頓首謹案右一帖草書四行三十四字晉散騎常侍里無考謝璠伯書舊列卷三第七今移此計江東精兵不可卒得唯當善養見者而事慮日多如比來憂懷已實萬端謹案右一帖草書四行三十字晉爵里無考謝發書舊列卷三第二十七又一本列第十七今移晉安素自強壯且年時尚可當延遐期豈謂奄至於此自畢逺境二三惋愕不能己己未知旨問悲酸悒悒想不久可得還耳執筆惻感謹案右一帖行草六行五十二字晉尚書左僕射東莞劉穆之書舊列卷三第十七又一本列第二十七標侍中今改並移殿晉臣示貶亦知足下家弊耳倉卒無祿官推遷不得不相用事已御出寧復吾所得回復足下且當就之公還當思更律啓申師情事也劉穆之白謹案右一帖草書六行五十二字晉大將軍琅琊王敦書舊列卷二第八標丞相今改並從史例移置晉末敦頓首頓首蠟節忽過歲暮感悼傷悲之意想自如常比苦腰痛憒憒得示知意反不以悉王敦頓首頓首謹案右一帖草書四行四十一字晉大司馬譙國桓溫書舊列卷二第六標丞相今改亦從史例移置大事之日僕在都謂無所復見慰勞又計時事也還節郎來已具言意餘所慰勞諸都督邊將粗當爾耳僕無所復治庶意謹案右一帖草書六行四十七字晉汝隂太守李矩妻河東衛鑠書舊列卷五第八標衛夫人今移改衛稽首和南近奉敕寫急就章遂不得與師書耳但衛隨世所學規摹鍾繇遂歷多載年草著書論草隸通解不敢上呈衛有一弟子王逸少甚能學衛真書咄咄逼人筆勢洞精字體遒媚師可詣晉尚書館書耳仰慿至鑒大不可言弟子李氏衛和南謹案右一帖行楷八行九十六字宋太子詹事琅琊王曇首書舊列卷三第二十八標特進又脫首字今移並增改昨服散差可然不過佳請示亦宜如更增劇恐難為力耳未能令遣俗有餘念故耳王曇首和南謹案右一帖草書五行三十七字宋中散大夫泰山羊欣書舊列卷三第二十九今移三月六日欣頓首暮春感摧切割不能自勝當奈何奈何得去六日告深慰足下復何如腳中日勝也吾日弊難復令自顧憂歎情想轉積執筆增惋足下保愛書欲何言羊欣頓首謹案右一帖行草七行六十九字宋給事中丹陽薄紹之書舊列卷四第十七誤唐時人但標名今移並增改知弟定欲回換住止周旋江參軍甚須一宅今㫖遣問之若必未得居宇多當成交關也但臨舟訪處自難稱意得消息㫖遣白薄紹之白謹案右一帖行草六行五十三字宋祠部尚書㑹稽孔琳之書舊列卷三第三十標太常卿又脫之字今移並增改日月深酷撫膺崩叫心肝分膾尋繹懊憹觸感隕絶孤思悒悒自郡地窮當奈何不孝奈何念痛悼難勝得去月二示知君所患故尓不差甚有幽悒熱盛比復何似想已轉佳眠食極勝也善將治之孤子並疾患歎具恨恨腳中轉劇近明散未覺益惙頓何賴扶力迷甚不次孤子孔琳之奏頓首謹案右一帖行草十一行一百十三字宋郢州刺史南蘭陵蕭思話書舊列卷四第五誤梁時人但標名今移並增改一月三日思話白節近說寒切足下復何如比何一涉道久當諸惡耶示告望近吾所患猶尓思話白謹案右一帖草書四行三十九字宋散騎常侍陳郡謝莊書舊列卷三第九誤晉時人但標名今移並增改弟昨還方承一日忽患悶當時乃尓大惡殊不易追企怛想諸治昨來已漸勝眠食復云何頃日寒重春節至居患者無不增動今作何治眼風不異耳指遣承問謝莊白呈左僕射謹案右一帖草書七行六十九字齊侍中琅琊王僧䖍書舊列卷三第三十一今移臣僧䖍啓劉伯竉陶瑾稱勑二岸雜事悉委臣判聖恩罔已奬使入效斯實臣下驅馳至願且職事所司不應多陳雖奉今旨臣豈敢於外下意不先上聞正當磬率管見令官長啓審可否之宜㑹須恩裁此乃更亂天聽或致煩壅且得仍舊以待能者恐於事體二三惟允伏願少留神照察覽所啓非敢辭務懼塵聖化謹冒輸請伏追震怍謹啓謹案右一帖楷書十二行一百三十二字今附録臣僧䖍啓南臺御史謝憲乃堪驅使臣門義舊粗事所悉統內新故雜米數十萬斛實須督切憲今請假在此臣欲折以統攝庶得速辨其頻經督運已有前效謹以啓聞伏願聽許謹啓謹案右一帖楷書六行七十一字今附録梁特進吳興沈約書舊列卷四第二今移今年殆無能十始得此一至沈約白十一月十六日謹案右一帖草書三行二十字梁侍中南蘭陵蕭子雲書舊列卷四第六但標名今移增舜問乎丞曰道可得而有乎曰汝身非汝有汝何得有天道舜曰吾身非吾有孰有之哉曰是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也孫子非汝有是天地之委蛻也故行不知所往處不知所持食不知所以天地強陽氣也又胡可得而有耶謹案右一帖楷書六行一百六字今附録齊之國氏大富宋之向氏大貧自宋之齊請其術國氏告之曰吾善為盜始吾為盜也一年而給二年而足三年大壤自此以往施及州閭向氏大喜喻其為盜之言而不喻其為盜之道遂踰垣鑿室手自所及亡不探也未及時以臧獲罪沒其光居之財向氏以國氏之謬己也往而怨之國氏曰若為盜若何向氏言其狀國氏曰嘻若失為盜之道至此乎今將告若矣吾聞天有時地有利吾盜天地之時利雲雨之滂潤山澤之産育以生吾禾殖吾稼築吾垣建吾舍吾陸盜禽獸水盜魚鱉亡非盜也夫禾稼土木禽獸皆天之所生豈吾之所有然吾盜天而亡殃夫金玉珍寶榖帛財貨人之所聚豈天之所與若盜之而獲罪孰怨哉向氏大惑以為國氏之重岡已過東郭先生問焉東郭先生曰若一身庸非盜乎盜陰陽之和以成若生載若形況外物而非盜乎誠然天地萬物不相離也仞而有之皆惑也國氏之盜公道也故亡殃若之盜私心也故得罪有公私者亦盜也亡公私者亦盜也公公私私天地之德知天地之德孰為盜耶孰為不盜耶謹案右一帖楷書十九行三百六十五字今附録又按帖中手自所及自列子作目蓋鉤摹之失或謂子列子曰子奚貴虛列子曰虛者無貴也子列子曰非其名也莫如靜莫如虛靜也虛也得其居矣取也與也失其所也事之破䃣而後有舞仁義者弗能復也謹案右一帖楷書四行六十三字今附録梁南中郎將南蘭陵蕭確書舊列卷四第四標征南將軍今移改故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其祿位而守其祭祀蓋士之孝也詩云夙興夜寐無忝尓所生謹案右一帖草書五行四十九字梁太子詹事琅琊王筠書舊列卷四首標尚書今移改筠和南至節過念哀慕深至情不可任寒凝道體何如想比清豫弟子羸勞每惡惙弊何理眷請勤御比日未叙遣白王筠和南謹案右一帖行草六行四十九字梁交州刺史陳留阮研書舊列卷四第三今移道增至得書深慰己熱卿何如吾甚勿勿始過嶠今便下水未因見卿為歎善自愛異日當至上京有因道增行所有少字不具阮研頓首謹案右一帖草書六行五十三字書法盛於晉代羲獻而下不乏名家江左相沿彬彬具在此卷自法護以逮齊梁舊多蹖駁陳逵為晉西中郎將而誤冠陳朝薄紹之蕭思話謝莊皆劉宋文人而薄則標唐蕭則標梁謝則標晉時代之不知尚足與論世乎劉瓌之孔琳之王曇首俱脫末一字沈嘉字長茂而誤作嘉長增減任意曽不一加詳審陋且妄矣又蕭確一人孫楨謂是梁邵陵王子黃伯思謂是齊豫章王孫考梁書載確工楷𨽻當從孫說王著標征南將軍則由南郎中將而誤也劉穆之當典午之季心在彭城大觀改標宋而仍具晉官未為至當考穆之始從霸府徵辟後以不預九錫推奉憂懼致死事與荀彧相類曩曽評鑑斥為小人徒自若夫穆之仕晉至尚書左僕射其死尚在義熙年宋初雖加增縣公已非身受今書晉而備其官所以愧夫儋爵祿而懷二心者其罪固與王敦桓溫之身為戎首有間猶當殿之東晉諸臣用示以義進退之權衡至若王曇首沈約在晉宋齊梁之際身事兩朝從其所終之代誅貶太公與史鑑同為炯著耳御識釋文訂異王珣書何如上一字姜夔作寒劉次莊顧從義俱作即日二字玩草法當是寒字又就弊從姜釋劉作能顧作服一作秋存疑王珉十八日帖比二書從顧從義釋劉次莊作以又比可不從姜夔釋顧作以何如帖得書下一字姜夔劉次莊顧從義俱作至王㴻作慰謂是筆快偶圓轉文義較至為長從之又末一字姜作具顧作亦具字較近從之玩力書不次應是書末語今轉加於王珉頓首之前而吾具語亦未了似原帖或有脫簡存疑欲出帖亟盡從黃庭堅釋王㴻云月小盡也姜夔顧從義作亟遣又臨出從劉次莊釋姜作餐顧云按書法當作限非又王家從姜釋一作敬非又敬報之敬姜作前劉顧俱作相㴻云當是敬字筆駛少折義較優從之王廞書分割從劉次莊施宿釋顧從義作瓜又遣下一字施作悲或作慰草法俱不合悲字義較近姑從之張翼書賴郎從顧從義釋賴劉次莊施宿並闕郎劉作卿一作即義俱未安姑釋以俟考又比何如姜夔作以顧同玩文義當是比字王循書詹從姜夔釋顧從義作遮一作舊玩草法遮舊俱不合惟詹字為近但名下加詹於文義無據考晉書賀循應詹同時為太子舍人或二人聨名具札鉤摹者不加深考妄以王循當之又於帖末署名率加王字宜其滋米芾之疑也今標名仍從舊附訂於此又不盡從顧釋姜作不宣劉瓌之書頓首頓首從姜夔釋顧從義闕下頓首二字空格不釋又末陽從顧釋姜作朱陽陳逵歲終帖白從劉次莊施宿釋顧從義作百非又足下從顧釋蓋兩字合一各借一筆耳羊欣帖亦然伯禮帖訊從陳與義釋又兄從王㴻釋云是筆駛多一折顧從義作足非又介從施宿釋顧云斺之省也又遣從顧釋或作進又願付亦從顧釋又令顧作今往劉次莊作佳顧作使玩文義當是令往㴻云此帖糢糊多誤兄介遣令往謹六字皆有失筆良然謝璠伯書比來從姜夔釋劉次莊作此非謝發書未知從劉次莊釋顧作未欲劉穆之書亦知從姜夔釋顧從義作所欲非又官亦從姜釋顧作故非又更律亦從姜釋顧云華本潘本俱糢糊惟顧本不損又啓從顧釋姜作昏王敦書悲下姜夔及顧從義作意不應多上一曲施宿分作今邑王㴻作邑邑於文義亦未合細玩草法似是之意二字之字借上筆成字猶陳逵帖足下合筆耳桓溫書還節從姜夔釋云溫使人送旌節還臺較顧從義逐節為勝又都督從顧釋姜夔作相問答劉次莊作相具答俱不甚合又復治庶意亦從姜釋云不復有意治軍政民事也義亦通復顧作使一作護治庶劉作治度顧作酒席俱不可解王曇首書差可之可從姜夔釋施宿作耳又請示從顧從義釋劉次莊作清和又所宜亦從姜釋顧云當作亦宜非又令從施釋顧作合又俗從姜釋顧作從帖內增字土旁有缺筆末首字畫亦微闕劉作答誤薄紹之書周旋從顧從義釋一作同於非又甚下一字顧闕施宿作得王㴻云何焯謂是須字摹失文義筆法俱相近從之又當字從顧釋㴻云亦摹誤又臨舟顧釋作臨丹義難通按字從兩㸃則是舟而非丹矣孔琳之書郡從姜夔釋顧從義作羣非又窮亦從姜釋顧作最非又知君亦從姜釋君顧作良又患亦從姜釋王㴻作惠非又幽悒亦從姜釋王㴻云當是悲悒又歎具從顧釋施宿作歎歎非又恨恨從黃伯思釋姜亦同顧作悒悒黃又以恨恨至覺益十二字偏小云是行側注字摹帖者妄以入行存考又迷甚亦從姜釋甚劉作反顧作亡俱非又帖末頓首上姜顧作奈何一合作等字草法俱不合玩字體是奏字古人於朋友通問亦稱奏記姑釋以俟考蕭思話書寒切從顧從義釋劉次莊作言切又望近上二字顧作少首或作小告俱不可解似是示告示字缺上筆耳又末思話字鉤摹亦失謝莊書一日從姜夔釋劉次莊合一日二字作間非又怛從顧從義釋姜作恆字體不合又諸治從姜顧釋又昨亦從姜顧釋又頃從顧釋姜作頓一作須又增從施宿釋顧作憎筆法亦不合沈約書殆無能從王㴻釋劉次莊作約垂離顧從義作殆差故又十始得此一至十劉闕顧作尓一至劉施闕顧作事至草法文義俱不合作十作一字體較近且可得解以乙為一則古人通用耳存考乾隆三十四年歲在己丑春二月奉敕校正宋淳化閣帖初搨模勒上石謹案第八卷共三十三帖一百九十四行二千六十四字欽定重刻淳化閣帖釋文卷八
