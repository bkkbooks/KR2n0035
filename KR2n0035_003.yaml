front:
  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷三
  hash: sha256:685fec29dec5f5130cabbea9c341f5f48a1797d19ba79fa65bf6e33516bdbde5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_003-1a, image: WYG0683/WYG0683-0581a.png}
body:
  text: 晉人法帖晉右軍將軍琅琊王羲之書舊列卷六但標名今移改舊五十九帖今移一帖入卷五適得書知足下問吾欲中治甚憒憒向宅上靜佳眠都不知足下來門甚無意恨不蹔面王羲之謹案右一帖草書五行三十七字知欲東先期共至謝奕處云何欲行想忘耳過此如命謹案右一帖草書三行二十一字差涼君可不今日寔顧不遲面力知問王羲之謹案右一帖草書三行十八字比奉對對兄以釋豈一謹案右一帖草書二行九字汝不可言未知集聚日但有慨歎各慎䕶前與㛐試求屏風遂不得茲為也謹案右一帖草書六行二十九字奄至此禍情願不遂緬然永絶痛之深至情不能已況汝豈可勝任奈何奈何無由叙哀悲酸謹案右一帖草書五行三十六字日月如馳㛐棄背再周去月穆松大祥奉瞻廓然永惟悲摧情如切割汝亦増慕省疏酸感謹案右一帖草書五行三十五字兄靈柩垂至永惟崩慕痛貫心膂痛當奈何計謹案右一帖草書三行十八字慈顔幽翳垂卅年而吾勿勿不知堪臨始終不發言哽絶當復奈何吾頃至勿勿比加下謹案右一帖草書五行三十四字省别具足下小大問為慰多分張念足下懸情武昌諸子亦多遠宦足下兼懷並數問不老婦頃疾篤救命恒憂慮餘粗平安知足下情至謹案右一帖草書六行五十三字旦夕都邑動靜清和想足下使還具時州將桓公告慰情企足下數使命也謝無奕外任數書問無他仁祖日往言尋悲酸如何可言謹案右一帖草書五行五十一字伏想㛐安和自下悉佳松上下至乖隔十八年復得一集且悲且慰何物喻㛐疾至篤憂懷甚深穆松難為情地自至猶小差然故勿勿冀得涼漸利耳謹案右一帖草書九行五十八字諸從並數有問粗平安惟修載在遠音問不數懸情司州疾篤不果西公私可恨足下所云皆盡事勢吾無間然諸問想足下别具不復一謹案右一帖草書五行五十四字此諸賢粗可時見省甚為簡闊遠頃異多小患而吾疾篤不得數為歎耳謹案右一帖草書三行二十八字宰相安和殷生無恙時面兄當宣兄懷謹案右一帖草書三行十五字噉豆鼠傷如佳今送能噉不謹案右一帖草書二行十一字得足下旃罽胡桃藥二種知足下至戎鹽乃要也是服食所須知足下謂須服食方回近之未許吾此志知我者希此有成言無縁見卿以當一笑謹案右一帖草書六行五十六字秋中感懷異雨冷足下各可可耳胛風遂欲成患甚憂之力知問王羲之頓首謹案右一帖草書三行三十字又不能不痛熙存亡政爾復何於求之度政當求之内事餘理不絶求之一條當有冀不信罔然前塗願具誨之以悟其心謹案右一帖草書六行四十七字疾不退潛損亦當日深豈可以常理待之此豈常憂不審食復何如云肌色可可所堪轉勝復以此慰馳竦耳謹案右一帖草書五行四十二字吾有七兒一女皆同生婚娶以畢惟一小者尚未婚耳過此一婚便得至彼今内外孫有十六人足慰目前足下情至委曲故具示謹案右一帖草書五行五十字省足下别疏具彼土山川諸竒揚雄蜀都左太冲三都殊為不備悉彼故為多竒益令其遊目意足也可得果當告卿求迎少人足耳至時示意遲此期真以日為嵗想足下鎮彼土未有動理耳要欲及卿在彼登汶領峨睂而旋實不朽之盛事但言此心以馳於彼矣謹案右一帖草書十一行一百二字云譙周有孫髙尚不出今為所在其人有以副此志不令人依依足下具示嚴君平司馬相如揚子雲皆有後不謹案右一帖草書五行四十三字夫人遂善平康也足下各可不冀行復面王羲之頓首謹案右一帖草書三行二十一字想小大悉佳蔡家賔至君情感益深唯當撥遣之耳謹案右一帖草書三行二十字知足下散勢小差此慰無以為喻云氣力故爾復以悒怛想散患得差餘當以漸消息耳謹案右一帖草書四行三十四字吾頃無一日佳衰老之弊日至夏不得有所噉而猶有勞務甚劣劣謹案右一帖草書四行二十六字昨得熙廿六日書云患氣懸情謹案右一帖草書二行十二字知足下連不快何爾耿耿善將適吾積羸困而下積日不斷情慮尚深殊乏自力不能悉謹案右一帖草書四行三十四字小佳更致問一一適脩載書平安謹案右一帖草書二行十三字羲之白奉告慰反側伏想比安和伯熊過見之悲酸大都可耳惟垂心羲之平平一日白以具謹案右一帖草書四行三十六字羲之白送此鯉魚征與敬耶不在不乃邑邑不謹案右一帖草書二行十八字月半哀悼兼至奈何奈何得告承復下懸耿至勿勿願不具王羲之再拜謹案右一帖草書三行二十八字今遣鄉里人往口具也謹案右一帖草書一行九字廿二日羲之報近得書即日又得永興書甚慰想在道可耳吾疾故爾沈滯憂悴解日面近不具羲之報謹案右一帖草書五行四十字四月廿三日羲之頓首昨書不悉君可不腫劇憂之力遣不具謹案右一帖草書三行二十四字羲之頓首闊别稍久眷與時長寒嚴足下何如想清豫耳披懷之暇復何致樂諸賢從就理當不疎吾之朽疾日就羸頓加復風勞諸無意賴促膝未近東望慨然所冀日月易得還期非遠耳深敬宜音問在數遇信忩遽萬不一陳謹案右一帖草書九行八十八字旦極寒得示承夫人復小欬不善得眠助反側想小爾復進何藥念足下猶悚息卿可不吾昨暮復大吐小噉物便爾旦來可耳知足下念王羲之頓首謹案右一帖行書六行五十八字卿與虞休意書有所問足下㫖為致誠答令旨意致來勿忘此意自決今以資嚴知小大疾患念勞心謹案右一帖草書五行三十九字四月五日羲之報建安靈柩至慈蔭幽絶垂卅年永惟慕痛澈五内永酷奈何無由言苦臨紙摧哽羲之報謹案右一帖行書四行四十一字吾昨得一日一起腹中極調適無所為憂但顧情不可言耳謹案右一帖草書三行二十三字侍中書書徐侯遂危篤恐無復冀深令人反側謹案右一帖草書三行十八字敬豫乃成委頓令人深憂謹案右一帖草書二行十字適知十五日問清和為慰復得南後問不想二庾速王之始興奴長就令人邑邑想無所至耳還具示問謹案右一帖草書五行四十字追尋傷悼但有痛心當奈何奈何得告慰之吾昨頻哀感便欲不自勝舉旦復服散行之益頓乏推理皆如足下所誨然吾老矣餘願未盡惟在子輩耳一旦哭之垂盡之年將無復理此當何益冀小却漸消散耳省卿書但有酸塞足下念顧言散所豁多也王羲之頓首謹案右一帖行草十一行一百三字不得臨川問懸心不可言子嵩之子來數有使冀因得問示之謹案右一帖草書三行二十四字得袁二謝書具為慰袁生蹔至都已還未此生至到之懷吾所也謹案右一帖草書三行二十五字想小大皆佳知賓猶爾耿耿想得夏節佳也念君勞心賢姊大都轉差然故有時嘔食不已至足言年衰疾久亦非可倉卒大都轉差為慰以大近不復服散常將陟厘也此藥為益如君告謹案右一帖草書八行七十二字適太常司州領軍諸人廿五六書皆佳司州以為平復此慶慶可言餘親親皆佳大奴以還吳也冀或見之謹案右一帖草書五行四十一字司州供給寥落去無期也不果者公私之望無理或復是福得大等書慰心今因書也野數言疏平安定太宰中郎謹案右一帖草書六行四十四字近因得里人書想至知故面腫耿耿今差不吾比日食意如差而髀中故不差以此為至患至不可勞力數字令弟知問耳謹案右一帖草書六行四十七字疾患差也念憂勞王羲之頓首謹案右一帖草書二行十二字想弟必有過理得蹔寫懷若此不果復斯欲難冀臨書多歎吾不復堪事比成此書便大頓謹案右一帖草書五行三十五字廿日羲之頓首節日感歎深念君増傷灾雨君可也謹案右一帖草書三行二十字僕可耳力數字王羲之頓首謹案右一帖草書二行十一字定聽他母子哀此遂不還可令未也謹案右一帖草書二行十四字適重熙書如此果爾乃甚可憂張平不立勢向河南者不知諸侯何以當之熈表故未出不説説荀侯疾患想當轉佳耳若熈得勉此一役當可言淺見實不見今時兵任可處理謹案右一帖草書八行六十八字二謝在此近終日不同同此歎恨不得方回知爽後問令人怛怛謹案右一帖草書三行二十五字逸少書為古今之冠子敬紹美家聲閣帖别次二王義亦有取然琅琊王氏入帖者十六人考其譜系導敦廙為一行羲之洽劭恬為一行凝之徽之操之渙之獻之珣珉廞為一行循則羣從别出者也舊所編次不依行輩於理未協今悉按其世次排類使之倫叙秩然至卷中譙周帖校大觀及十七帖六十帖諸本缺為所在以下十字今依大觀摹補又帖内有上下筆勢連屬原刻分行隔斷者亦為移置期不失臨池本意其行成一帖乃賈曾送張説赴朔方序見於唐文粹葢輯右軍字成文者因改編第五卷末俾真蹟集書不相淆混若臨川帖中子嵩黄伯思謂是庾敳字敳與右軍不同時姜䕫謂此言其子意似以為無礙但右軍旣不識子嵩何不直言其子名而上溯其父字且引右軍嘗為臨川作據理亦未安無怪啟人訾議然王帖中米芾所指為偽托者頗多而又不能明斥為出自何人之手則亦存而弗論可耳御識釋文訂異王羲之適得帖中治從顧從義釋王澍云當是中冷非又憒憒亦從顧釋劉次莊作怏怏又來門從王澍釋顧作來一非欲東帖奕字諸家釋作欲玩草法文義俱不合按謝奕為安西司馬羲之旦夕帖亦及之帖葢指其人因改又云何從顧從義釋一作之何非奉對帖對對從顧從義釋又兄以黄庭堅釋作兄比按此帖疑有脫誤汝不帖前與從顧從義釋王澍云當作前云非日月帖疏字諸家釋並同文義則安而草法不合或是疾書筆誤伏想帖何物從陳與義釋劉次莊作指非又漸利從顧從義釋施宿作和諸從帖一一從唐張彦遠釋彦遠集羲獻帖語為二王書録在諸家音釋之前頗為可據因酌從之諸賢帖闊從顧從義釋一作理非又遠頃從王澍釋顧作須非旃罽帖謂須從張彦遠釋謂顧從義作得須施宿作頃俱非秋中帖胛從陳與義釋劉次莊作脾非前塗帖存從施宿釋姜䕫作薦義尚可通劉次莊作孝非又二政字顧從義云俱當作正逸少祖名正故以政代之也馳竦帖肌從王澍釋顧從義作飢非又竦從施宿釋劉次莊作疏非七兒帖以畢從陳與義釋按以與已通凡當作已者俱倣此彼土帖求迎從張彦遠釋顧從義作進非又以日諸家釋並同玩筆法似是比字存考散勢帖悒從顧從義釋或作胡非王澍疑是灼尚可通昨得帖懸情諸家釋並同按懸字與草法不合然别無可考姑仍之奉告帖以具從施宿釋顧從義作比具鯉魚帖征借作􅙰用與鯖同月半帖悼諸家釋並同王澍云當作忤非鄉里帖口具從顧從義釋王澍云當作一一非虞休帖患從顧從義釋玩草法殊不類王澍云當作連亦未確建安帖苦從顧從義釋張彦遠作告劉次莊作昔一作發並非一起帖昨從顧從義釋朱家標作聞非又顧情亦從顧釋劉次莊作願或作欣皆非侍中帖書書諸家釋並同王澍云古帖凡帶下一㸃皆作白存考又徐侯從顧從義釋澍云當作涂侯亦無可據敬豫帖豫從施宿釋劉次莊作潒陳與義作像俱非清和帖適知從施宿釋又二庾從顧從義釋陳與義作庚一作康俱非又速王亦從顧釋按明張溥刻右軍集以速王之始興為句義尚可通速或作建王或作至非追尋帖酸塞從顧從義釋劉次莊施宿作毁非臨川帖川從顧從義釋一作小非袁生帖還未顧從義云未字不出頭當是樂字非又吾所也從姜䕫釋姜云所也之間當别有一字存考顧云吾疑作無非知賓帖不已及倉卒並從顧從義釋玩已字倉字草法俱不甚合當是鉤摹之失太常帖領軍從張彦遠釋劉次莊作鎮非又以還亦從張釋或作比非里人帖得從張彦遠釋一作鄉非又髀中從劉次莊釋顧從義作骭想弟帖不果復從劉次莊釋施宿作役非又斯欲從王澍釋顧從義作期欲節日帖雨從顧從義釋一作兩非僕可帖僕從顧從義釋米芾作餘一作深俱非重熈帖得勉從張彦遠釋得顧從義作自陳與義作目俱非勉即免字二謝帖同同從施宿釋劉次莊作同之非又爽從王澍釋顧從義作春義可通而草法不合施作幸幸非乾隆三十四年嵗在己丑春二月奉勅校正宋淳化閣帖初搨模勒上石謹案第三卷共五十八帖二百五十五行二千五十字欽定重刻淳化閣帖釋文卷三
