body:
  text: 壬辰清和御筆朕幾餘不自暇逸典學之優時及臨池曩曾輯內府所藏前人墨蹟刻為三希堂墨妙軒二帖廣示藝林復念古帖流傳可補墨蹟所未備者惟宋淳化閣帖鐫集尤為美富遠出大觀太清樓諸本之上但惜初搨與賜者絶鮮或云版尋殘損當時已為難得後來翻刻愈繁真意寖失有志追摹者末由津逮內府舊藏淳化閣帖極多而此畢士安所得賜本搨最精好爰特敕選工鉤摹上石冀復舊觀苐王著昧於辨别其所排類標題舛陋滋甚不當聽其沿訛以誤後學因命于敏中等詳加考正以次呈閲候朕參定分識各卷並命搜採諸家釋文依字旁注其互異者折衷附記於後以資省覽是於考文稽古之中兼寓舉墜訂訛之益用嘉惠海內操觚之士焉特諭乾隆三十四年二月六日御筆欽定四庫全書欽定校正淳化閣帖釋文提要臣等謹案欽定校正淳化閣帖釋文十卷乾隆三十四年奉詔以內府所藏宋畢士安家淳化閣帖賜本詳加釐正重勒貞珉首冠以御題寓名藴古四字及御題淳化軒記命諸臣校正摹勒諭㫖末載原帖舊跋及諸臣書後其中古帖次第一從舊刻而於朝代之先後名字之標題皆援證史文裁以書法碑不乖於春秋之義每卷皆恭摹御筆論斷昭示權衡又參取劉次莊黃伯思姜夔施宿顧從義王㴻諸說而以大觀太清樓諸帖互相考校凡篆籕行草皆注釋文於字旁復各作訂異以辨正是非别白疑似誠為墨林之極軌書苑之大觀乾隆四十三年侍郎金簡以石刻貯在禁庭自宣賜以外罕得瞻仰乃恭録釋文請以聚珍板摹印俾共窺八法之精微由是流布人間遂衣被于海內考張彥逺法書要録末有右軍書記一卷所載王羲之帖四百六十五附王獻之帖十七並一一為之釋文劉克莊之釋閣帖蓋即以是為藍本然彥逺書傳寫多訛克莊書至南北宋間陳與義已奉敕作法帖釋文刋誤一卷今附刻韋續墨藪之末則克莊所釋不盡足據可知苐諸家雖知其有訛而辨正未能悉當遞相駁詰轉益多岐恭逄我皇上天縱聰明游心翰墨裁成頡籀陶鑄鍾王訓示儒臣詳為釐定書家乃得所指南是不惟臨池者之幸抑亦漢晉以來能書者之至幸矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
