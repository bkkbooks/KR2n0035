body:
  text: 淳化閣帖自唐以上名書大備昔人稱其精神完足橅勒逼真為諸家法帖之冠顧初搨傳世絶尠而後來翻刻支派紛岐去之愈逺大觀帖世所推許而孫承澤尚謂遜淳化樸氣他無論矣至若初本之為石為木論者齗齗莫定考王應麟玉海云淳化初求先賢墨蹟為法帖十卷命工勒石與帖尾所識上石者正合夫曰上石則非木板可知人或泥於歐陽修集古録鏤板語轉相傅會若棗木板銀錠􅀢之說不一而足甚而趙孟頫以為題曰上石其實木也云云尤盭於理復何庸深辨乎又太平興國時因詔搜訪圖書諸州各有所獻而昇州則獻王羲之獻之及桓温等十八家石版書迹此帖未嘗不有所取資好奇者遂以南唐昇元帖為淳化祖刻抑亦鑿矣我皇上宵旰幾餘時親翰墨於古今諸大家臨倣都徧薈美集成嘗輯石渠珍秘鐫列貞珉嘉惠來學三希墨妙兩帖海内夙己奉若球璧兹以淳化閣帖日久湮晦而内府舊藏賜畢士安本搨法佳妙蘇頌李洪諸跋亦徵而可信王鐸定為宋搨第一顧人罕得覯也爰命臣等排校選匠重鉤鐫摹不爽秒黍又以王著昧於考古舛謬滋繁米芾黄伯思輩糾而未改大觀刻本訂而不詳重為名帖之累並勅臣等審勘參稽旁及音釋每一巻成上加以折衷次第評隲識諸冊後於凡體例世次名系爵里以及誤編複出之陋悉為辨改犁然各當工始於乾隆庚寅春二月迄今壬辰夏四月告蕆並仿宋搨法得四百部用廣流傳於是七百餘年之名蹟重復舊觀而精覈則勝於曩昔又以多而足珍操觚者咸得仰星雲之麗誠萬世士林之幸而因帖名軒搆廊列石亦淳化刻本之幸臣等獲以編校微勞綴名簡末尤詞臣稽古之榮幸云臣于敏中臣王際華臣裘曰修恭跋
