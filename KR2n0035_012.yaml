body:
  text: 臣謹案集帖至宋始盛如雪溪寶晉澄堂祕閣諸名傳者絶鮮獨淳化祖刻自南唐升元帖而後鐫集最為美富當宋太宗時侍書成都王著名在周越右尤善雙鉤能敓真本相傳智永千文其所補小字樂毅論即其所書也下此則蔡京所摹大觀帖姿媚稍多古意寖失逺不逮矣顧王著工於仿古昧於察書編次既繁所在舛陋當時米芾黃長睿秦觀各有専書以糾其失其他見於古今詩文及說部筆記者指摘不勝枚舉我皇上幾餘游藝時及臨池集字學之大成訂書流之盤錯前此三希堂墨妙軒二帖石渠所輯悉以津逮藝林兹復取內府所藏閣帖遴其初搨最精者為淳化四年賜畢士安本選工摹勒俾還舊觀特命內廷諸臣于敏中等詳加考正欽定諸家世次分識卷端史論書評相為表裏其有闕疑悉令仍之並敕搜採諸家釋文依字旁注一一析其異同折中至當用嘉惠海內操觚之士刻成砌石於長春園之含經堂後修廊蜒蜿羅列球琳適如其數復親灑帝鴻之墨製為淳化軒記發明因帖命名之意而於上法唐虞化成天下諄諄三致意焉一翰墨之考稽而法戒昭然大聖人即藝見道之深衷有默契乎羲畫禹書之表者矣臣以祝嘏來京䝉恩頒示仰見我皇上闡微往蹟則篆真並列發矇承學斯鉤躍不遺若卷首降晉宣帝洎會稽王於臣列春秋大㫖凜然至鑒裁之精摹勒之妙萬世學書者所當奉為繩尺臣無庸贅一辭焉臣林栖耄齒樂觀厥成得挂名於石曷勝榮幸之至臣錢陳羣拜手稽首恭跋
