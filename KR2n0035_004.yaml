  text: 欽定四庫全書欽定重刻淳化閣帖釋文卷四
  hash: sha256:72431212838edf8ed590b052a9c5aa58b514664599a52cf47abe1ef4c6910031
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0035_WYG_004-1a, image: WYG0683/WYG0683-0590c.png}
body:
  text: 晉人法帖晉右軍將軍琅琊王羲之書舊列卷七今移改一舊五十三帖今刪帖移一帖入卷九自卷二歸入一帖七月一日羲之白忽然秋月但有感歎信反得去月七日書知足下故羸疾問觸暑遠涉憂卿不可言吾故羸乏力不具王羲之白謹案右一帖草書六行五十字得都下九日書見桓公當陽去月九日書久當至洛但運遲可憂耳蔡公遂委篤又加帶下日數十行深可憂慮得仁祖草六日問疾更委篤深可憂當今人物眇然而艱疾若此令人短氣謹案右一帖草書八行七十二字謝光祿亦垂命可憂念念一朝奄忽傷人懷今年雕落可哀歎謹案右一帖草書三行二十四字徂暑感懷深得書知足下故頓乏食差不耿耿吾故爾耳未果為結力不具王羲之謹案右一帖草書三行三十二字月半念足下窮思深至不可居忍雨濕體氣各何如參軍得針灸力不甚懸情當深寬割晴通省苦遣不具王羲之白謹案右一帖草書五行四十五字長素差不懸耿小大佳也得敬豫九日問故進退憂之深謹案右一帖草書三行二十二字知念許君與足下意政同但今非致言地甚敕敕亦不知范生以居職未以卿示輒便及之吾尚不能惜小節目但一開無解已又亦終無能為益適足為煩瀆足下呼爾不謹案右一帖草書六行六十六字每念長風不可居忍昨得其書既毁頓又復壯溫深可憂謹案右一帖草書三行二十二字得長風書靈柩幽隔卅年心想平昔痛慕崩絶豈可居處抽裂不能自勝謝書已具日安厝即其情事長畢奈何松等隕慟哀情頓泄亦難可言郗還未卜聊示友中郎相憂不去心感遠懷近增傷惋每見范母子哀號使人情悲謹案右一帖行草九行八十七字初月二日羲之頓首忽然今年感兼傷痛切心奈何奈何念君哀窮不已羲之皇恐謹案右一帖草書四行三十二字足下時事少可數來主人相尋下官吏不東西未委若為言敘乖足下不返重遣信往問願知心素謹案右一帖草書四行三十八字吾怪足下參朝少晚不審有何事情致使如然也王羲之再拜謹案右一帖草書三行二十四字前從洛至此未及就彼參承願夫子勿悒悒矣當日緣明府共飲遂闕問願足下莫見責羲之頓首謹案右一帖草書四行三十八字十一月草七日羲之報得十四十八日二書知問為慰寒切比各佳不念憂勞久懸情吾食至少劣劣力因謝司馬書不具羲之報謹案右一帖草書五行五十字十月七日羲之報前過足下所得其書想殊有勞弊然叔兄子孫有數人足慰目前情至取答委曲故具示可令必達以副此志且山川甚有形勢遠想慨然又出藥精要有驗信比可致當大惠也從弟分别吾深憂慮卿女轗軻想何可處差充喜言不多耳羲之謹案右一帖草書十一行一百字皇象草章旨信送之勿三當付良信謹案右一帖草書二行十四字遠婦疾猶爾其餘可耳今取書付想具謹案右一帖草書二行十五字阮生何如此粗平安數絶問為慰謹案右一帖草書二行十三字羲之白君晚可不想比果力不具王羲之謹案右一帖草書二行十六字得遠嘉興書計今日必度喜遲可言足下至慰今有書想足下有旨信别告具之謹案右一帖草書四行三十一字云足下尚停數日半百餘武瞻望不得一見卿此何可言足下疾苦晴便大熱如恆中至不易可得過夏不甚憂卿還具示問謹案右一帖草書五行四十八字得告承長平未佳善得適適君如常也知有患苦耿耿念勞心食少勞甚頓還白不具王羲之再拜謹案右一帖草書四行三十八字足下小大佳也諸疾苦憂勞非一如何復得都下近問不吾得敬和草三日書無他重熙住定為善謝二侯謹案右一帖草書四行四十一字省飛白乃致佳造次尋之乃欲窮本無論小進也稱此將青於藍謹案右一帖草書三行二十五字知比得丹楊書甚慰乖離之歎當復可言尋答其書足下反事復行便為索然良不可言此亦分耳遲面具謹案右一帖草書五行四十一字太常故患胛灸俞體中可可耳僕射事已行以表讓未知恕不未復司州旨告懸竦鄱陽嵗使應有書而未得謹案右一帖草書五行四十二字向亦得万書委曲備悉使人慨然見足下乃悉知叔虎尅昨發月半略必至未見勞參軍謹案右一帖草書四行三十四字熱日更甚得書知足下不堪之同此無賴早且乘涼行欲往遲散也王羲之謹案右一帖草書三行二十九字知賢室委頓何以便爾甚助耿耿念勞心知得草四問亦得叔虎草二日書云新年乃得發安石昨必欲尅潘家欲尅草五日也足下以語張令未前所經由足下近如似欲見今送謹案右一帖草書六行六十九字七月六日羲之白多日不知問邑邑得二日書知足下昨問耿耿今已佳也謹案右一帖草書三行二十九字期已至遲還具足下問耳當力東冶道家無緣省苦但有悲慨不得東此月問謹案右一帖草書四行三十字信云舍子别送乃是北方物也何以欲此欲幾許致此四紙飛白以為何似能學不謹案右一帖草書四行三十二字月末必往遲見君無以為喻謹案右一帖草書二行十一字鄉里人擇藥有發夢而得此藥者足下豈識之不乃云服之令人仙不知誰能試者形色故小異莫即嘗見者謝二侯謹案右一帖草書五行四十五字昨見君歡復無喻然未善悉想宿昔可耳脅中云何一善消息德周轉勝也耿耿疾患小差與𢎞遠俱詣遲共寫懷王羲之謹案右一帖草書五行四十七字雪候既不已寒甚盛冬平可苦患足下亦當不堪之轉復知問王羲之謹案右一帖草書三行二十七字知遠比當造頃遲見此子真以日為嵗足下得審問旨令吾謹案右一帖草書三行二十三字荀侯佳不未果就卿深企懷耳安好音信那云愚得歸洛也計介解有懸休尋謹案右一帖草書五行三十字知君當有分住者念處窮毒而復分乖尚可居情想反理斷當謹案右一帖草書三行二十四字旦反想至所苦晚差不耿耿僕腳中不堪沈陰重痛不可言不知何以治之憂深力不具王羲之頓首謹案右一帖草書四行三十九字深以自慰理有大斷其思豁之令盡足下勿乃憂之足下殊當憂吾故具示問謹案右一帖行草四行三十字晚復毒熱想足下所苦並以佳猶耿耿吾至頓劣冀涼言散力知問王羲之頓首謹案右一帖行草三行三十一字足下家極知無可將接為雨遂乃不復更諸弟兄問疾深護之不具羲之白耳謹案右一帖行草四行三十字僕近修小園子殊佳致果雜藥深可致懷也儻因行往希見比二處動靜故故常患馳情散騎癰轉利慶慰姊故諸惡及比永嘉慰奉集欣熹無喻餘可耳得華直疏故爾諸惡不差懸憂順何似未復慶等近消息懸心君並何為耶此猶未得盡集理行大尅遲此無喻謹案右一帖草書十五行一百二字龍保等平安也謝之甚遲見之謹案右一帖草書二行十二字知足下行至吳念違離不可居叔當西耶遲知問謹案右一帖草書二行十九字知彼清晏嵗豐又所使有無無鄉故是名處且山川形勢乃爾何可以不遊目謹案右一帖草書四行三十字朱處仁今所在往得其書信遂不取答今因足下答其書可令必達謹案右一帖草書三行二十六字吾服食久猶為劣劣大都比之年時為復可可足下保愛為上臨書但有惆悵謹案右一帖草書三行三十字彼鹽井火井皆有不足下目見不為欲廣異聞具示謹案右一帖草書三行二十字足年今年政七十耶知體氣常佳此大慶也想復勤加頤養吾年垂耳順推之人理得尓以為厚幸但恐前路轉欲逼耳以尓要欲一遊目汶領非復常言足下但當保護以俟此期勿謂虛言得果此緣一段竒事也謹案右一帖草書九行八十二字唐貞觀內本十七帖最為烜赫著名張彥遠帖録載二十二則今內府所藏宋拓本乃三十則而南宋修內司本又為二十八則黃伯思為南唐澄心堂十七帖二十七則且云王著摹以入石茲閲閣帖羲之書與十七帖同者凡十有五此卷末得七帖而舛謬殊甚雖不可居之上一行八字誤置服食帖末復脫服食帖首兩行二十一字不審著當時按帖鉤鋟何率略糾錯乃尓大觀雖曽增改而結字别成機杼與原帖不侔今悉依宋拓十七帖摹補至龍保帖闕卿勇可耳至為簡隔也九字而末有之字則尚可成文因仍其舊蓋考證確有據依自應訂正若彼此互異有不妨兩存傳信傳疑論古之道當如是耳至長風一帖舊列鍾繇而體殊不類伯思謂是逸少早年書考此卷亦有長風帖帖録别有長風盡平安語則長風自屬逸少時人洵宜改以相次其謝生帖重見後卷筆法無一不合惟在山句多一下字刪此存彼貴有權衡固不必踵襲前人訛復也御識釋文訂異王羲之秋月帖問從顧從義釋黃庭堅謂是而字缺上一筆非桓公帖蔡公公字起筆摹誤今從大觀改正謝光祿帖下念字一字從顧從義釋劉次莊施宿合作二字非月半帖割晴從顧從義釋二字義不可通王澍云摹拓有誤又省苦亦從顧釋施宿作省告長素帖小大從張溥釋字畫明了無可疑顧從義作不大蓋沿别本字誤知念帖益從顧從義釋陳與義作蓋非每念長風帖壯溫諸家釋並同但義不可解他又無可考證存疑得長風書帖具日從施宿釋顧從義作乞日非初月帖皇恐從顧從義釋王澍云當是皇恐皇恐存參施宿作呈耳一作皇皇俱非時事帖主人從顧從義釋又敘亦從顧釋王澍云當是鉤摹小失一作欲非寒切帖切從劉次莊釋王澍云上帶筆鉤摹小失顧從義作切非十月七日帖叔兄從顧從義釋一作七見非又比從施宿釋顧作次一作須皆非又充從顧釋王澍作二兄非皇象帖勿三從顧從義釋王澍云三或三思之三楊慎作勿勿非君晚帖羲之下顧從義釋有白字玩筆勢當是之字末筆微拖與月半帖異尚停帖武從顧從義釋劉次莊作里非又如恆諸釋或作小船或作所恨大觀改作甚恆俱不甚足憑玩文義及草法恆字自無可疑上一字當是如字微有缺損耳存考長平帖患苦從王澍釋澍云苦字鉤橅有失筆良是顧從義釋作者非丹楊帖反事從顧從義釋劉次莊施宿作友事非太常帖竦從顧從義釋劉次莊作諫非又應有亦從顧釋或合二字作膺非得万書帖備悉本無缺顧從義釋作備半亦沿别本之誤熱日帖且從劉次莊釋顧從義作旦非又遲字微有缺筆賢室帖便爾從王澍釋澍云是筆偶出玩初拓上筆與下撇本不相屬似係石版損䀶由别本聯為一筆諸家遂誤作使耳又以語從顧從義釋或作比非多日帖昨問劉次莊陳與義施宿釋並同王澍云二字皆鉤摹有失顧從義作比門於義難通力東帖冶顧從義釋作論或作詣王澍作治義俱未安考晉書會稽有東冶因從冶又省苦從顧釋施宿作告别送帖舍子從顧從義釋草法雖合而文義難解但無可考據姑從之擇藥帖發夢從王澍釋按此與十七帖夢中結體正類劉次莊施宿作簡非又即顧從義釋作與或作有或作可義俱難通惟顧云一作即文義較順姑從之其字體不甚完或是鉤摹微失昨見帖昨從劉次莊釋顧從義云當作所非又德從王澍釋顧作值非又詣黃庭堅作臨一作治或作謁顧云當作詣較諸釋為長從之雪候帖苦患從張彥遠釋顧從義作吾患非知遠帖頃從王澍釋陳與義作須顧從義作次俱非或作江草法尚合荀侯帖深從劉次莊釋顧從義疑作諄或作淳俱非又安好亦從劉釋顧云當作安西非又那從劉釋云從薑夔釋草法頗合但云字有缺筆耳或作明公存考顧作那可非又愚諸釋或作遇或作里或作還字體俱不類義亦未安惟愚字草法差近釋以俟考又計介從王澍釋顧作計令非分住帖反字從顧從義釋或作友非自慰帖大從劉次莊釋顧從義作火非晚復帖言從王澍釋顧從義作意非將接帖末耳字文義不屬王澍云當由集書人妄增小園帖故故從顧從義釋施宿作故之非又及比亦從顧釋或作反側非又嘉慰亦從顧釋慰薑夔作至非又華直亦從顧釋劉次莊作華宜非又何似亦從顧釋或作以非清晏帖豐從顧從義釋施宿作無非又所使亦從顧釋十七帖作所出又有無無鄉亦從顧釋但義不可解或作有豐一鄉或有無無以或有無一乏草法俱不甚合存疑乾隆三十四年嵗在己丑春二月奉敕校正宋淳化閣帖初拓模勒上石謹案第四卷共五十一帖二百二十一行一千九百七字欽定重刻淳化閣帖釋文卷四
